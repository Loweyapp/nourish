// ── Helpers ───────────────────────────────────────────────────────────────────
function today() { return new Date().toISOString().split("T")[0]; }
function yesterday() {
  const d = new Date(); d.setDate(d.getDate() - 1);
  return d.toISOString().split("T")[0];
}
function formatDate(d) {
  return new Date(d + "T12:00:00").toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" });
}
function fmtMins(m) {
  if (!m) return "0h 0m";
  return `${Math.floor(m/60)}h ${m%60}m`;
}

// ── LocalStorage ──────────────────────────────────────────────────────────────
const ls = {
  get: (k, fallback = null) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fallback; } catch { return fallback; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
  del: (k) => { try { localStorage.removeItem(k); } catch {} },
  str: (k) => localStorage.getItem(k) || "",
  setStr: (k, v) => localStorage.setItem(k, v),
};

function loadEntries()   { return ls.get(STORAGE_KEY, {}); }
function saveEntries(e)  { ls.set(STORAGE_KEY, e); }
function getApiKey()     { return (ls.str(API_KEY_STORAGE) || "").trim(); }
function saveApiKey(k)   { ls.setStr(API_KEY_STORAGE, k); }
function getFitbitToken(){ return ls.get(FB_TOKEN_KEY); }
function getCoachingStyle() { return ls.str(COACHING_KEY) || ""; }
function saveCoachingStyle(s) { ls.setStr(COACHING_KEY, s); }
// Session token tracking
const sessionUsage = { input: 0, output: 0 };
function trackUsage(usage) {
  if (!usage) return;
  sessionUsage.input  += usage.input_tokens  || 0;
  sessionUsage.output += usage.output_tokens || 0;
}
function estimateCost() {
  // claude-sonnet-4 pricing: ~£2.37/M input, ~£11.85/M output (at ~$1=£0.79)
  const cost = (sessionUsage.input / 1e6) * 2.37 + (sessionUsage.output / 1e6) * 11.85;
  return cost < 0.01 ? "<£0.01" : `£${cost.toFixed(3)}`;
}
function saveFitbitToken(t) { ls.set(FB_TOKEN_KEY, t); }
function clearFitbitToken() { ls.del(FB_TOKEN_KEY); ls.del(FB_FETCH_KEY); }

// ── Google Drive ──────────────────────────────────────────────────────────────
function getGDriveToken()   { return ls.get(GDRIVE_TOKEN_KEY); }
function saveGDriveToken(t) { ls.set(GDRIVE_TOKEN_KEY, t); }
function clearGDriveToken() { ls.del(GDRIVE_TOKEN_KEY); }
function getLastBackup()    { return ls.str(GDRIVE_LAST_BACKUP); }

function isGDriveConnected() {
  const t = getGDriveToken();
  if (!t) return false;
  if (t.expires_at && Date.now() > t.expires_at - 60000) { clearGDriveToken(); return false; }
  return true;
}

function startGDriveAuth() {
  const params = new URLSearchParams({
    client_id:     GDRIVE_CLIENT_ID,
    redirect_uri:  REDIRECT_URI,
    response_type: "token",
    scope:         GDRIVE_SCOPE,
    state:         "gdrive_auth",
    prompt:        "consent",
  });
  window.location.href = "https://accounts.google.com/o/oauth2/v2/auth?" + params;
}

async function findOrCreateFolder(token) {
  const q = encodeURIComponent("name='Nourish Backups' and mimeType='application/vnd.google-apps.folder' and trashed=false");
  const search = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`, {
    headers: { Authorization: "Bearer " + token }
  });
  if (search.status === 401) { clearGDriveToken(); throw new Error("Google session expired — please reconnect"); }
  const data = await search.json();
  if (data.files?.length) return data.files[0].id;
  const create = await fetch("https://www.googleapis.com/drive/v3/files", {
    method: "POST",
    headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },
    body: JSON.stringify({ name: "Nourish Backups", mimeType: "application/vnd.google-apps.folder" })
  });
  if (!create.ok) throw new Error("Could not create Nourish Backups folder: " + create.status);
  const folder = await create.json();
  return folder.id;
}

async function backupToDrive(entries) {
  const tokenData = getGDriveToken();
  if (!tokenData?.access_token) throw new Error("Not connected to Google Drive");
  if (tokenData.expires_at && Date.now() > tokenData.expires_at - 60000) {
    clearGDriveToken();
    throw new Error("Google session expired — please reconnect in Settings");
  }
  const token    = tokenData.access_token;
  const folderId = await findOrCreateFolder(token);
  const date     = new Date().toISOString().split("T")[0];
  const filename = `nourish-backup-${date}.json`;
  const content  = JSON.stringify({ exportedAt: new Date().toISOString(), entries }, null, 2);

  // Multipart upload so we can set metadata (name + parent) in one request
  const boundary = "nourish_bnd_" + Math.random().toString(36).slice(2);
  const body = [
    `--${boundary}\r\n`,
    `Content-Type: application/json\r\n\r\n`,
    JSON.stringify({ name: filename, parents: [folderId] }) + "\r\n",
    `--${boundary}\r\n`,
    `Content-Type: application/json\r\n\r\n`,
    content + "\r\n",
    `--${boundary}--`
  ].join("");

  const res = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart", {
    method: "POST",
    headers: {
      Authorization: "Bearer " + token,
      "Content-Type": `multipart/related; boundary=${boundary}`
    },
    body
  });
  if (res.status === 401) { clearGDriveToken(); throw new Error("Google session expired — please reconnect"); }
  if (!res.ok) throw new Error(`Backup failed (HTTP ${res.status})`);
  ls.setStr(GDRIVE_LAST_BACKUP, new Date().toISOString());
  return filename;
}

function shouldAutoBackup() {
  const last = getLastBackup();
  if (!last) return true;
  const daysSince = (Date.now() - new Date(last).getTime()) / (1000 * 60 * 60 * 24);
  return daysSince >= BACKUP_INTERVAL_DAYS;
}


// ── Dummy data seeder (for previewing graphs) ─────────────────────────────────
function seedDummyData() {
  if (ls.str(DUMMY_SEEDED_KEY) === "cleared") return; // user explicitly cleared
  const entries = loadEntries();
  const alcDays = [
    [],
    [{ text:"2 pints of lager (4%)", units:4.6 }],
    [],
    [{ text:"Glass of red wine (175ml, 13%)", units:2.3 }],
    [],
    [{ text:"3 pints of lager (4%), double gin & tonic", units:8.9 }],
    [{ text:"Bottle of beer (330ml, 5%)", units:1.65 }],
  ];
  const bpData = [
    { sys:128, dia:84, pulse:68 },
    { sys:132, dia:86, pulse:72 },
    { sys:126, dia:82, pulse:65 },
    { sys:135, dia:88, pulse:75 },
    { sys:124, dia:80, pulse:64 },
    { sys:138, dia:90, pulse:78 },
    { sys:129, dia:83, pulse:70 },
  ];
  let changed = false;
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const dateStr = d.toISOString().split("T")[0];
    const idx = 6 - i;
    const existing = entries[dateStr] || {};
    // Only add BP if not already set
    const needsBP  = !existing.bpSystolic;
    // Only add alcohol if not already set
    const needsAlc = !existing.alcohol?.length && alcDays[idx].length > 0;
    if (needsBP || needsAlc) {
      entries[dateStr] = {
        ...existing,
        ...(needsBP  ? { bpSystolic: bpData[idx].sys, bpDiastolic: bpData[idx].dia, bpPulse: bpData[idx].pulse } : {}),
        ...(needsAlc ? { alcohol: alcDays[idx] } : {}),
      };
      changed = true;
    }
  }
  if (changed) saveEntries(entries);
  ls.setStr(DUMMY_SEEDED_KEY, "1");
  return changed ? entries : null;
}

function clearDummyData() {
  ls.setStr(DUMMY_SEEDED_KEY, "cleared");
}


async function askClaude(messages, systemPrompt) {
  const key = getApiKey();
  if (!key) throw new Error("No API key");
  const coaching = getCoachingStyle();
  const fullSystem = systemPrompt + (coaching ? `

Personal coaching preferences from the user: ${coaching}` : "");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: fullSystem, messages }),
  });
  const raw = await res.text();
  let data; try { data = JSON.parse(raw); } catch { throw new Error(`Bad response: ${raw.slice(0,100)}`); }
  if (!res.ok || data.error) throw new Error(data.error?.message || `HTTP ${res.status}`);
  trackUsage(data.usage);
  return data.content?.[0]?.text || "";
}

// ── Fitbit OAuth (PKCE) ───────────────────────────────────────────────────────
function b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");
}
async function pkce() {
  const verifier = b64url(crypto.getRandomValues(new Uint8Array(32)));
  const challenge = b64url(await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier)));
  return { verifier, challenge };
}
function fitbitAuthUrl(challenge) {
  const p = new URLSearchParams({
    response_type: "code", client_id: FITBIT_CLIENT_ID,
    redirect_uri: REDIRECT_URI, scope: FITBIT_SCOPES,
    code_challenge: challenge, code_challenge_method: "S256",
    expires_in: "604800"
  });
  return "https://www.fitbit.com/oauth2/authorize?" + p;
}
async function exchangeCode(code, verifier) {
  const res = await fetch("https://api.fitbit.com/oauth2/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({ client_id: FITBIT_CLIENT_ID, grant_type: "authorization_code", redirect_uri: REDIRECT_URI, code, code_verifier: verifier })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.errors?.[0]?.message || "Token exchange failed");
  return data;
}
async function refreshFitbitToken() {
  const stored = getFitbitToken();
  if (!stored?.refresh_token) return null;
  const res = await fetch("https://api.fitbit.com/oauth2/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({ client_id: FITBIT_CLIENT_ID, grant_type: "refresh_token", refresh_token: stored.refresh_token })
  });
  const data = await res.json();
  if (!res.ok) { clearFitbitToken(); return null; }
  const token = { ...data, expires_at: Date.now() + data.expires_in * 1000 };
  saveFitbitToken(token);
  return token.access_token;
}
async function getFitbitAccessToken() {
  const stored = getFitbitToken();
  if (!stored) return null;
  if (stored.expires_at && Date.now() < stored.expires_at - 60000) return stored.access_token;
  return await refreshFitbitToken();
}
const FITBIT_PROXY = "https://rapid-star-52f2.alexlowe1.workers.dev/fitbit";

async function fitbitGet(path) {
  const token = await getFitbitAccessToken();
  if (!token) throw new Error("No Fitbit token — please reconnect");
  let res;
  try {
    res = await fetch(FITBIT_PROXY + path, { headers: { Authorization: "Bearer " + token } });
  } catch(netErr) {
    throw new Error("Network error: " + (netErr.message || String(netErr)));
  }
  if (res.status === 401) { clearFitbitToken(); throw new Error("Fitbit token expired — please reconnect"); }
  let data; try { data = await res.json(); } catch { throw new Error("Bad response from proxy (HTTP " + res.status + ")"); }
  if (!res.ok) throw new Error(data.errors?.[0]?.message || "Fitbit error " + res.status);
  return data;
}

// Fetch today's Fitbit data
async function fetchFitbitDay() {
  const actSum    = await fitbitGet("/1/user/-/activities/date/" + today() + ".json");
  const sleepData = await fitbitGet("/1.2/user/-/sleep/date/" + today() + ".json");
  const hrData    = await fitbitGet("/1/user/-/activities/heart/date/" + today() + "/1d.json");

  const steps        = actSum.summary?.steps ?? 0;
  const activeMin    = actSum.summary?.fairlyActiveMinutes + actSum.summary?.veryActiveMinutes ?? 0;
  const calsBurned   = actSum.summary?.caloriesOut ?? 0;
  const restingHR    = hrData["activities-heart"]?.[0]?.value?.restingHeartRate ?? null;

  // Sleep: Fitbit returns sleep that ended on the date (i.e. last night)
  const mainSleep    = sleepData.sleep?.find(s => s.isMainSleep) || sleepData.sleep?.[0];
  const sleepMins    = mainSleep?.minutesAsleep ?? 0;
  const deepMins     = mainSleep?.levels?.summary?.deep?.minutes ?? 0;
  const remMins      = mainSleep?.levels?.summary?.rem?.minutes ?? 0;
  const lightMins    = mainSleep?.levels?.summary?.light?.minutes ?? 0;
  const awakeMins    = mainSleep?.levels?.summary?.wake?.minutes ?? 0;
  const sleepStart   = mainSleep?.startTime ?? null;
  const sleepEnd     = mainSleep?.endTime ?? null;

  return { steps, activeMin, calsBurned, restingHR, sleepMins, deepMins, remMins, lightMins, awakeMins, sleepStart, sleepEnd, fetchedAt: Date.now() };
}

// ── Day context ───────────────────────────────────────────────────────────────
function buildDayContext(entry) {
  if (!entry) return "No data logged today yet.";
  const parts = [];
  if (entry.food?.length) {
    const totalCals = entry.food.reduce((s, f) => s + (f.calories || 0), 0);
    parts.push(`Food: ${entry.food.map(f => `${f.meal}: ${f.text} (${f.calories} kcal)`).join("; ")}. Total: ${totalCals} kcal.`);
  }
  if (entry.mood)     parts.push(`Mood: ${MOODS.find(m => m.value === entry.mood)?.label}.`);
  if (entry.energy)   parts.push(`Energy: ${ENERGY.find(e => e.value === entry.energy)?.label}.`);
  if (entry.moodNote) parts.push(`Wellbeing notes: "${entry.moodNote}".`);
  if (entry.exercise) parts.push(`Exercise: ${entry.exercise}.`);
  if (entry.weight)   parts.push(`Weight: ${entry.weight}kg.`);
  if (entry.bp?.systolic) parts.push(`Blood pressure: ${entry.bp.systolic}/${entry.bp.diastolic} mmHg.`);
  if (entry.bpSystolic && entry.bpDiastolic) parts.push(`Blood pressure: ${entry.bpSystolic}/${entry.bpDiastolic} mmHg${entry.bpPulse ? `, pulse ${entry.bpPulse} bpm` : ""}.`);
  if (entry.alcohol?.length) {
    const totalUnits = entry.alcohol.reduce((s,a)=>s+(a.units||0),0).toFixed(1);
    parts.push(`Alcohol: ${entry.alcohol.map(a=>a.text).join(", ")}. Total units: ${totalUnits}.`);
  }
  if (entry.fitbit) {
    const f = entry.fitbit;
    if (f.steps)     parts.push(`Steps: ${f.steps.toLocaleString()}.`);
    if (f.sleepMins) parts.push(`Sleep last night: ${fmtMins(f.sleepMins)} (deep ${fmtMins(f.deepMins)}, REM ${fmtMins(f.remMins)}, light ${fmtMins(f.lightMins)}).`);
    if (f.restingHR) parts.push(`Resting heart rate: ${f.restingHR} bpm.`);
    if (f.activeMin) parts.push(`Active minutes: ${f.activeMin}.`);
    if (f.calsBurned)parts.push(`Calories burned (total): ${f.calsBurned}.`);
  }
  const base = parts.length ? parts.join(" ") : "No data logged today yet.";
  return base + getCompletenessNote(entry);
}

// ── Meal completeness checker ────────────────────────────────────────────────
function getMealWarnings(entry) {
  const now = new Date();
  const timeDecimal = now.getHours() + now.getMinutes() / 60;
  const food = entry?.food || [];
  const loggedCals = food.reduce((s, f) => s + (f.calories || 0), 0);
  const warnings = [];

  // After 10:30am with nothing logged yet
  if (timeDecimal >= 10.5 && loggedCals === 0) {
    warnings.push({ type: "meal", msg: "Nothing logged yet today — don't forget to add what you've eaten." });
  }

  // After 1:30pm and very few calories (under 300 — likely only a snack logged)
  if (timeDecimal >= 13.5 && loggedCals > 0 && loggedCals < 300) {
    warnings.push({ type: "meal", msg: `Only ${loggedCals} kcal logged by lunchtime — are some meals missing?` });
  }

  // After 8pm and still low (under 600 kcal — probably dinner not yet logged)
  if (timeDecimal >= 20.0 && loggedCals < 600) {
    warnings.push({ type: "meal", msg: `Only ${loggedCals} kcal logged — if you've had dinner, don't forget to add it. You can always roll earlier meals in with dinner.` });
  }

  // Fitbit deficit check: if Fitbit burned > logged + 1200
  const burned = entry?.fitbit?.calsBurned || 0;
  if (burned > 0 && (burned - loggedCals) > 1200) {
    warnings.push({ type: "fitbit", msg: `Fitbit shows ${burned} kcal burned but only ${loggedCals} kcal logged — some meals may be missing.` });
  }

  return warnings;
}

// Build a completeness note for Claude context
function getCompletenessNote(entry) {
  const warnings = getMealWarnings(entry);
  if (!warnings.length) return "";
  const slots = warnings.filter(w => w.type === "meal").map(w => w.slot);
  const fitbitWarn = warnings.find(w => w.type === "fitbit");
  const parts = [];
  if (slots.length) parts.push(`Possibly missing meals: ${slots.join(", ")}`);
  if (fitbitWarn) parts.push(fitbitWarn.msg);
  return `

DATA COMPLETENESS WARNING: ${parts.join(". ")}. The logged calorie total may be significantly understated. Factor this uncertainty into your analysis — do not treat the logged figure as accurate.`;
}

}
function AIBubble({ text, loading }) {

  return (
    <div style={{ marginTop:10, padding:"12px 14px", background:"linear-gradient(135deg,#fdf6ee,#f5e9d6)", borderLeft:"3px solid #c8955a", borderRadius:"0 10px 10px 0", fontSize:13.5, lineHeight:1.6, color:"#5a3e28", whiteSpace:"pre-wrap" }}>

      {text}
    </div>

}
function ChatWidget({ systemPrompt, contextSummary, placeholder="Ask a follow-up…" }) {
  const [history, setHistory] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const bottomRef = useRef(null);
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [history, loading]);
  const send = async () => {
    if (!input.trim() || loading) return;
    const userMsg = { role:"user", content:input.trim() };
    setInput(""); setLoading(true); setError("");
    const msgs = contextSummary
      ? [{ role:"user", content:"Please acknowledge the context." }, { role:"assistant", content:contextSummary }, ...history, userMsg]
      : [...history, userMsg];
    try { const reply = await askClaude(msgs, systemPrompt); setHistory(p => [...p, userMsg, { role:"assistant", content:reply }]); }
    catch(e) { setError(e.message); }
    setLoading(false);
  };
  return (
    <div style={{ marginTop:12, borderTop:"1px solid #ecdfc8", paddingTop:12 }}>
      <div style={{ fontSize:11, fontWeight:700, color:"#a07850", letterSpacing:1, marginBottom:8 }}>💬 ASK A FOLLOW-UP</div>
      {history.length > 0 && (
        <div style={{ maxHeight:260, overflowY:"auto", marginBottom:10, display:"flex", flexDirection:"column", gap:8 }}>
          {history.map((m,i) => (

  );
}

// ── Unified Food & Drink Section ─────────────────────────────────────────────
function FoodSection({ foodItems, onUpdate, alcoholItems, onAlcoholUpdate, dayContext, fitbitData }) {
  const [text, setText] = useState("");
  const [loading, setLoading] = useState(false);
  const [imageLoading, setImageLoading] = useState(false);
  const [pending, setPending] = useState(null);   // food pending
  const [pendingDrink, setPendingDrink] = useState(null); // alcohol pending
  const [pendingTime, setPendingTime] = useState("");
  const [previewSrc, setPreviewSrc] = useState(null);
  const [error, setError] = useState("");

  const resizeImage = (file) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Failed to read file"));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error("Failed to decode image"));
      img.onload = () => {
        const MAX = 1024;
        let { width: w, height: h } = img;
        if (w > MAX || h > MAX) { if (w > h) { h = Math.round(h*MAX/w); w=MAX; } else { w=Math.round(w*MAX/h); h=MAX; } }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve({ b64: canvas.toDataURL("image/jpeg", 0.85).split(",")[1], mediaType:"image/jpeg" });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });

  const handleImage = async (file) => {
    if (!file) return;
    setImageLoading(true); setPending(null); setPendingDrink(null); setText(""); setError("");
    const pr = new FileReader(); pr.onload = e => setPreviewSrc(e.target.result); pr.readAsDataURL(file);
    try {
      const { b64, mediaType } = await resizeImage(file);
      const key = getApiKey();
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "x-api-key":key, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
        body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:400,
          messages:[{ role:"user", content:[
            { type:"image", source:{ type:"base64", media_type:mediaType, data:b64 } },
            { type:"text", text:"Describe what you see in this image. It could be food, a drink, or both. If it's a food: include estimated portions (e.g. '2 scrambled eggs on toast'). If it's an alcoholic drink or bottle/can label: include the drink type, volume, and ABV% if visible on the label (e.g. 'pint of Guinness 4.2%', '175ml glass of red wine approx 13%', '330ml can of Stella Artois 5%'). Be concise — just the description, no other commentary." }
          ]}]
        })
      });
      const raw = await resp.text();
      let data; try { data = JSON.parse(raw); } catch { throw new Error("Bad response"); }
      if (!resp.ok || data.error) throw new Error(data.error?.message || `HTTP ${resp.status}`);
      setText(data.content?.[0]?.text || "");
    } catch(e) { setError("Couldn't identify: " + (e?.message || String(e))); }
    setImageLoading(false);
  };

  // Smart analyse — handles single items, drinks, or multi-meal descriptions
  const analyse = async () => {
    if (!text.trim()) return;
    setLoading(true); setPending(null); setPendingDrink(null); setError("");
    const nowHour = new Date().getHours();
    setPendingTime(`${String(nowHour).padStart(2,"0")}:00`);
    try {
      const resp = await askClaude(
        [{ role:"user", content:`User entry: "${text}"` }],
        `You are a nutrition and drinks expert. The user may enter a single item or multiple meals at once, e.g. "Lunch 2 eggs and salad. Dinner steak and broccoli."

Return ONLY valid JSON, no markdown.

If SINGLE food or drink:
{"multi":false,"type":"food"|"alcohol"|"both","calories":<n>,"protein_g":<n>,"carbs_g":<n>,"fat_g":<n>,"units":<n>,"drink_type":"<or null>","abv":<n or null>,"volume_ml":<n or null>,"commentary":"<2-3 sentences>"}

If MULTIPLE meals/items:
{"multi":true,"items":[{"text":"<description>","type":"food"|"alcohol"|"both","suggested_time":"<HH:00 best guess e.g. 08:00 for breakfast, 13:00 for lunch, 19:00 for dinner>","calories":<n>,"protein_g":<n>,"carbs_g":<n>,"fat_g":<n>,"units":<n>,"drink_type":"<or null>","abv":<n or null>,"volume_ml":<n or null>}],"commentary":"<2-3 sentence overall summary>"}

User's day so far: ${dayContext}
Be realistic. UK measurements and British English.`
      );
      const parsed = JSON.parse(resp.replace(/` + "```" + `json|` + "```" + `/g,"").trim());
      if (parsed.multi) {
        const newFood = [], newDrinks = [];
        for (const item of parsed.items) {
          const t = item.suggested_time || "12:00";
          if (item.type === "alcohol") newDrinks.push({ ...item, time: t });
          else if (item.type === "both") { newFood.push({ ...item, time: t }); newDrinks.push({ ...item, time: t }); }
          else newFood.push({ ...item, time: t });
        }
        if (newFood.length)   onUpdate([...foodItems, ...newFood]);
        if (newDrinks.length) onAlcoholUpdate([...alcoholItems, ...newDrinks]);
        const totalCals = parsed.items.reduce((s,i)=>s+(i.calories||0),0);
        const totalProt = parsed.items.reduce((s,i)=>s+(i.protein_g||0),0);
        const totalCarb = parsed.items.reduce((s,i)=>s+(i.carbs_g||0),0);
        const totalFat  = parsed.items.reduce((s,i)=>s+(i.fat_g||0),0);
        setPending({ _multiSummary:true, commentary:parsed.commentary, calories:totalCals, protein_g:totalProt, carbs_g:totalCarb, fat_g:totalFat });
        setText("");
      } else {
        if (parsed.type === "alcohol") setPendingDrink({ ...parsed, text: text.trim() });
        else if (parsed.type === "both") { setPending({ ...parsed, text: text.trim() }); setPendingDrink({ ...parsed, text: text.trim() }); }
        else setPending({ ...parsed, text: text.trim() });
      }
    } catch(e) { setError(e.message || "Couldn't analyse — try being more specific."); }
    setLoading(false);
  };

  const addItem = () => {
    const nowTime = pendingTime;
    if (pending) {
      onUpdate([...foodItems, { ...pending, time: nowTime }]);
    }
    if (pendingDrink) {
      onAlcoholUpdate([...alcoholItems, { ...pendingDrink, time: nowTime }]);
    }
    setText(""); setPending(null); setPendingDrink(null); setPendingTime(""); setPreviewSrc(null);
  };

  const removeFood = (i) => onUpdate(foodItems.filter((_,idx)=>idx!==i));
  const removeDrink = (i) => onAlcoholUpdate(alcoholItems.filter((_,idx)=>idx!==i));
  const updateFoodTime = (i, t) => onUpdate(foodItems.map((f,idx)=>idx===i?{...f,time:t}:f));
  const updateDrinkTime = (i, t) => onAlcoholUpdate(alcoholItems.map((a,idx)=>idx===i?{...a,time:t}:a));

  const totalCals = foodItems.reduce((s,f)=>s+(f.calories||0),0);
  const totalUnits = alcoholItems.reduce((s,a)=>s+(a.units||0),0);

  const isPending = pending || pendingDrink;
  const chatCtx = pending
    ? `Item: "${pending.text}". ${pending.calories} kcal, ${pending.protein_g}g protein, ${pending.carbs_g}g carbs, ${pending.fat_g}g fat${pendingDrink ? `, ${pendingDrink.units} alcohol units` : ""}. Assessment: ${pending.commentary}`
    : pendingDrink ? `Drink: "${pendingDrink.text}". ${pendingDrink.units} units, ${pendingDrink.calories} kcal. ${pendingDrink.commentary}` : null;

  // Combine food + drink items for unified timeline
  const allItems = [
    ...foodItems.map((f,i) => ({ ...f, _type:"food", _i:i })),
    ...alcoholItems.map((a,i) => ({ ...a, _type:"drink", _i:i }))
  ].sort((a,b) => (a.time||"").localeCompare(b.time||""));

  return (
    <Section title="🍽 Food & Drink" accent="#c8955a">


      <input id="nourish-camera" type="file" accept="image/*" capture="environment" style={{ display:"none" }}
        onChange={e=>{ handleImage(e.target.files?.[0]); e.target.value=""; }} />
      <input id="nourish-gallery" type="file" accept="image/*" style={{ display:"none" }}
        onChange={e=>{ handleImage(e.target.files?.[0]); e.target.value=""; }} />
      <div style={{ display:"flex", gap:8, marginBottom:12 }}>
        <label htmlFor="nourish-camera" style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", gap:6, padding:"10px 8px", borderRadius:10, border:"1.5px solid #e0ccb4", background:"#faf6f0", color:"#8a6840", fontSize:14, fontFamily:"inherit", userSelect:"none" }}>📷 Camera</label>
        <label htmlFor="nourish-gallery" style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", gap:6, padding:"10px 8px", borderRadius:10, border:"1.5px solid #e0ccb4", background:"#faf6f0", color:"#8a6840", fontSize:14, fontFamily:"inherit", userSelect:"none" }}>🖼 Gallery</label>
      </div>

      {imageLoading && <div style={{ marginBottom:10 }}><Spinner label="Identifying…" /></div>}
      {previewSrc && !imageLoading && (
        <div style={{ marginBottom:10, display:"flex", gap:10, alignItems:"flex-start" }}>
          <img src={previewSrc} alt="item" style={{ width:72, height:72, objectFit:"cover", borderRadius:10, border:"1.5px solid #ecdfc8", flexShrink:0 }} />
          <div style={{ fontSize:12, color:"#a07850", lineHeight:1.5, paddingTop:2 }}>Identified — edit below if needed, then tap Analyse.</div>
        </div>
      )}

      <textarea placeholder="e.g. bowl of porridge with banana, pint of Guinness, glass of red wine…" value={text} onChange={e=>setText(e.target.value)}
        style={{ width:"100%", minHeight:72, padding:"10px 12px", borderRadius:10, border:"1.5px solid #e0ccb4", background:"#fff", fontFamily:"inherit", fontSize:14, color:"#3d2b1a", resize:"vertical", outline:"none" }} />
      {error && <div style={{ fontSize:12, color:"#c87a6a", marginTop:6 }}>{error}</div>}

      <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
        <AnalyseBtn onClick={analyse} disabled={!text.trim()||loading}>Analyse</AnalyseBtn>
        {isPending && !pending?._multiSummary && <AnalyseBtn onClick={addItem} color="#6a9e6a">✓ Add to log</AnalyseBtn>}
      </div>
      {loading && <div style={{ marginTop:10 }}><Spinner /></div>}

      {isPending && (
        <div style={{ marginTop:12 }}>
          {!pending?._multiSummary && (
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
            <span style={{ fontSize:12, color:"#a07850", fontWeight:600 }}>Time:</span>
            <HourSelect value={pendingTime} onChange={setPendingTime} />
          </div>
          )}
          {pending?._multiSummary && (
            <div style={{ padding:"10px 12px", background:"#f0fdf0", borderRadius:10, border:"1.5px solid #6a9e6a33", marginBottom:10, fontSize:13, color:"#3d5a28" }}>
              <div style={{ fontWeight:700, color:"#6a9e6a", marginBottom:4 }}>✓ {pending.calories} kcal logged across multiple entries</div>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:8 }}>
                {[{label:"Protein",value:pending.protein_g,unit:"g",color:"#6a9e6a"},{label:"Carbs",value:pending.carbs_g,unit:"g",color:"#7a9ec8"},{label:"Fat",value:pending.fat_g,unit:"g",color:"#c87a6a"}].map(s=>(
                  <div key={s.label} style={{ textAlign:"center", padding:"4px 10px", background:"#faf6f0", borderRadius:8, border:`1.5px solid ${s.color}33` }}>
                    <div style={{ fontSize:15, fontWeight:700, color:s.color }}>{s.value}g</div>
                    <div style={{ fontSize:10, color:"#8a6840" }}>{s.label}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
          {/* Food macros */}
          {pending && !pending._multiSummary && (
            <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:10 }}>
              {[{label:"Calories",value:pending.calories,unit:"kcal",color:"#c8955a"},{label:"Protein",value:pending.protein_g,unit:"g",color:"#6a9e6a"},{label:"Carbs",value:pending.carbs_g,unit:"g",color:"#7a9ec8"},{label:"Fat",value:pending.fat_g,unit:"g",color:"#c87a6a"}].map(s=>(
                <div key={s.label} style={{ flex:"1 1 70px", textAlign:"center", padding:"8px 6px", background:"#faf6f0", borderRadius:10, border:`1.5px solid ${s.color}33` }}>
                  <div style={{ fontSize:18, fontWeight:700, color:s.color }}>{s.value}</div>
                  <div style={{ fontSize:10, color:"#8a6840", letterSpacing:0.5 }}>{s.unit} {s.label}</div>
                </div>
              ))}
            </div>
          )}
          )}
          {/* Drink units */}
          {pendingDrink && (
            <div style={{ display:"inline-flex", alignItems:"center", gap:8, padding:"8px 14px", background:"#fdf0e0", borderRadius:10, border:"1.5px solid #c8955a33", marginBottom:10 }}>
              <span style={{ fontSize:20 }}>🍺</span>
              <div>
                <div style={{ fontWeight:700, color:"#c8955a", fontSize:16 }}>{pendingDrink.units} units</div>
                <div style={{ fontSize:11, color:"#a07850" }}>{pendingDrink.drink_type}{pendingDrink.abv ? ` · ${pendingDrink.abv}% ABV` : ""}{pendingDrink.volume_ml ? ` · ${pendingDrink.volume_ml}ml` : ""}</div>
              </div>
            </div>
          )}
          <AIBubble text={(pending||pendingDrink)?.commentary} />
          {chatCtx && <ChatWidget systemPrompt={`You are a friendly nutritionist and health coach. Today: ${dayContext}. Answer follow-up questions about this food or drink. British English.`} contextSummary={chatCtx} placeholder="e.g. How many units is that this week? What could I eat instead?" />}
        </div>
      )}

      {/* Unified log */}
      {allItems.length > 0 && (
        <div style={{ marginTop:14, borderTop:"1px solid #ecdfc8", paddingTop:10 }}>
          {allItems.map((item, idx) => item._type === "food" ? (
            <div key={`f${item._i}`} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 4px", borderBottom:"1px solid #f5ece0", fontSize:13 }}>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  <HourSelect value={item.time||"08:00"} onChange={t=>updateFoodTime(item._i,t)} />
                </div>
                <div style={{ color:"#3d2b1a", marginTop:2, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.text}</div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0, marginLeft:8 }}>
                <span style={{ fontWeight:700, color:"#c8955a" }}>{item.calories} kcal</span>
                <button onClick={()=>removeFood(item._i)} style={{ background:"none", border:"none", color:"#c87a6a", fontSize:20, lineHeight:1, padding:"0 4px" }}>×</button>
              </div>
            </div>
          ) : (
            <div key={`d${item._i}`} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 4px", borderBottom:"1px solid #f5ece0", fontSize:13 }}>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  <HourSelect value={item.time||"08:00"} onChange={t=>updateDrinkTime(item._i,t)} />
                  <span style={{ color:"#a07850", fontSize:11 }}>· 🍺 drink</span>
                </div>
                <div style={{ color:"#3d2b1a", marginTop:2, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.drink_type || item.text}</div>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0, marginLeft:8 }}>
                <span style={{ fontWeight:700, color:"#c8955a" }}>{item.units}u</span>
                <button onClick={()=>removeDrink(item._i)} style={{ background:"none", border:"none", color:"#c87a6a", fontSize:20, lineHeight:1, padding:"0 4px" }}>×</button>
              </div>
            </div>
          ))}
          <div style={{ display:"flex", justifyContent:"space-between", paddingTop:8, fontSize:14, fontWeight:700 }}>
            <span style={{ color:"#c8955a" }}>Total: {totalCals} kcal</span>
            {totalUnits > 0 && <span style={{ color:"#c8955a" }}>🍺 {totalUnits.toFixed(1)} units</span>}
          </div>
        </div>
      )}
    </Section>
  );
}

// ── Fitbit Section ────────────────────────────────────────────────────────────
function FitbitSection({ fitbitData, onUpdate, connected }) {
  const [syncing, setSyncing] = useState(false);
  const [error, setError] = useState("");

  const sync = async () => {
    setSyncing(true); setError("");
    try {
      const data = await fetchFitbitDay();
      onUpdate(data);
      ls.setStr(FB_FETCH_KEY, today());
    } catch(e) { setError(e.message); }
    setSyncing(false);
  };

  const startAuth = async () => {
    const { verifier, challenge } = await pkce();
    ls.setStr(FB_VERIFIER_KEY, verifier);
    window.location.href = fitbitAuthUrl(challenge);
  };

  if (!connected) {
    return (
      <Section title="📱 Fitbit" accent="#6a7ec8">
        <div style={{ fontSize:13.5, color:"#8a6840", marginBottom:12, lineHeight:1.6 }}>
          Connect Fitbit to automatically pull your steps, sleep, and heart rate each day.
        </div>
        <button onClick={startAuth}
          style={{ padding:"10px 20px", background:"linear-gradient(135deg,#6a7ec8,#4a5ea8)", color:"#fff", border:"none", borderRadius:12, fontSize:14, fontFamily:"inherit", fontWeight:700 }}>
          Connect Fitbit
        </button>
      </Section>
    );
  }

  const f = fitbitData;
  const fetchTime = f?.fetchedAt ? new Date(f.fetchedAt).toLocaleTimeString("en-GB", { hour:"2-digit", minute:"2-digit" }) : null;

  return (
    <Section title="📱 Fitbit" accent="#6a7ec8">
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <div style={{ fontSize:11, color:"#a07850" }}>{fetchTime ? `Last synced ${fetchTime}` : "Not synced today"}</div>
        <button onClick={sync} disabled={syncing}
          style={{ padding:"6px 14px", background:"#6a7ec8", color:"#fff", border:"none", borderRadius:8, fontSize:12, fontFamily:"inherit", fontWeight:600 }}>
          {syncing ? "Syncing…" : "↻ Sync now"}
        </button>
      </div>
      {error && <div style={{ fontSize:12, color:"#c87a6a", marginBottom:8 }}>{error}</div>}
      {syncing && <div style={{ marginBottom:10 }}><Spinner label="Fetching Fitbit data…" /></div>}
      {f && (
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          {/* Steps */}
          <div>
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:4 }}>
              <span style={{ fontWeight:600, color:"#3d2b1a" }}>👟 Steps</span>
              <span style={{ fontWeight:700, color:"#6a7ec8" }}>{(f.steps||0).toLocaleString()} <span style={{ fontWeight:400, fontSize:11, color:"#a07850" }}>/ 10,000</span></span>
            </div>
            <ProgressBar value={f.steps||0} max={10000} color="#6a7ec8" />
          </div>
          {/* Sleep */}
          {f.sleepMins > 0 && (
            <div>
              <div style={{ fontWeight:600, color:"#3d2b1a", fontSize:13, marginBottom:8 }}>🌙 Sleep last night</div>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                <StatPill label="Total" value={fmtMins(f.sleepMins)} unit="" color="#7a6ec8" />
                <StatPill label="Deep" value={fmtMins(f.deepMins)} unit="" color="#4a5ea8" />
                <StatPill label="REM" value={fmtMins(f.remMins)} unit="" color="#8a7ec8" />
                <StatPill label="Light" value={fmtMins(f.lightMins)} unit="" color="#aaa0d8" />
              </div>
            </div>
          )}
          {/* HR + Activity */}
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            {f.restingHR && <StatPill label="Resting HR" value={f.restingHR} unit="bpm" color="#c87a6a" />}
            {f.activeMin > 0 && <StatPill label="Active mins" value={f.activeMin} unit="min" color="#6a9e6a" />}
            {f.calsBurned > 0 && <StatPill label="Cals burned" value={f.calsBurned} unit="kcal" color="#c8955a" />}
          </div>
        </div>
      )}
      {!f && !syncing && (
        <div style={{ fontSize:13, color:"#a07850" }}>Tap "Sync now" to pull today's data from Fitbit.</div>
      )}
    </Section>
  );
}

// ── Blood Pressure Section ────────────────────────────────────────────────────
function BPSection({ entry, onUpdate }) {
  const [systolic, setSystolic]   = useState(entry.bpSystolic  || "");
  const [diastolic, setDiastolic] = useState(entry.bpDiastolic || "");
  const [pulse, setPulse]         = useState(entry.bpPulse     || "");
  const [note, setNote]           = useState(entry.bpNote      || "");
  const [savedFlash, setSavedFlash] = useState(false);

  const save = () => {
    if (!systolic || !diastolic) return;
    onUpdate({ bpSystolic: systolic, bpDiastolic: diastolic, bpPulse: pulse, bpNote: note });
    setSavedFlash(true); setTimeout(() => setSavedFlash(false), 1500);
  };

  const category = () => {
    if (!systolic || !diastolic) return null;
    const s = Number(systolic), d = Number(diastolic);
    if (s < 120 && d < 80)   return { label: "Normal",         color: "#6a9e6a" };
    if (s < 130 && d < 80)   return { label: "Elevated",       color: "#c8a830" };
    if (s < 140 || d < 90)   return { label: "High (Stage 1)", color: "#c8955a" };
    if (s >= 140 || d >= 90) return { label: "High (Stage 2)", color: "#c87a6a" };
    return null;
  };
  const cat = category();

  return (
    <Section title="❤️ Blood Pressure" accent="#c87a6a">
      <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", marginBottom:8 }}>
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center" }}>
          <input type="number" placeholder="120" value={systolic} onChange={e=>setSystolic(e.target.value)}
            style={{ width:72, padding:"10px 8px", borderRadius:10, border:"1.5px solid #e0ccb4", background:"#fff", fontFamily:"inherit", fontSize:18, color:"#3d2b1a", outline:"none", textAlign:"center" }} />
          <span style={{ fontSize:10, color:"#a07850", marginTop:3 }}>Systolic</span>
        </div>
        <span style={{ fontSize:22, color:"#c8b898", fontWeight:300, marginBottom:14 }}>/</span>
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center" }}>
          <input type="number" placeholder="80" value={diastolic} onChange={e=>setDiastolic(e.target.value)}
            style={{ width:72, padding:"10px 8px", borderRadius:10, border:"1.5px solid #e0ccb4", background:"#fff", fontFamily:"inherit", fontSize:18, color:"#3d2b1a", outline:"none", textAlign:"center" }} />
          <span style={{ fontSize:10, color:"#a07850", marginTop:3 }}>Diastolic</span>
        </div>
        <div style={{ display:"flex", flexDirection:"column", alignItems:"center" }}>
          <input type="number" placeholder="72" value={pulse} onChange={e=>setPulse(e.target.value)}
            style={{ width:72, padding:"10px 8px", borderRadius:10, border:"1.5px solid #e0ccb4", background:"#fff", fontFamily:"inherit", fontSize:18, color:"#3d2b1a", outline:"none", textAlign:"center" }} />
          <span style={{ fontSize:10, color:"#a07850", marginTop:3 }}>Pulse (opt.)</span>
        </div>
        <span style={{ fontSize:11, color:"#a07850", alignSelf:"flex-end", marginBottom:18 }}>mmHg</span>
      </div>
      {cat && (
        <div style={{ display:"inline-block", padding:"4px 12px", borderRadius:20, background:cat.color+"22", border:`1.5px solid ${cat.color}`, color:cat.color, fontSize:12, fontWeight:600, marginBottom:8 }}>
          {cat.label}
        </div>
      )}
      <textarea placeholder="Any notes? Time of day, how you were feeling, medication taken…" value={note}
        onChange={e=>setNote(e.target.value)}
        style={{ width:"100%", minHeight:50, padding:"10px 12px", borderRadius:10, border:"1.5px solid #e0ccb4", background:"#fff", fontFamily:"inherit", fontSize:14, color:"#3d2b1a", resize:"vertical", outline:"none" }} />
      <div style={{ display:"flex", alignItems:"center", gap:10, marginTop:10 }}>
        <button onClick={save} disabled={!systolic||!diastolic}
          style={{ padding:"9px 20px", background:(!systolic||!diastolic)?"#d0b898":"#c87a6a", color:"#fff", border:"none", borderRadius:10, fontSize:14, fontFamily:"inherit", fontWeight:600, cursor:"pointer" }}>
          Save
        </button>
        {savedFlash && <span style={{ fontSize:12, color:"#6a9e6a", fontWeight:600 }}>Saved ✓</span>}
      </div>
    </Section>
  );
}

// ── Insights Tab ──────────────────────────────────────────────────────────────
function InsightsTab({ entries }) {
  const [insight, setInsight] = useState("");
  const [loading, setLoading] = useState(false);
  const [analysed, setAnalysed] = useState(false);
  const [error, setError] = useState("");

  const days = Object.entries(entries).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,14);
  const moodData   = [...days].reverse().map(([d,e])=>({ d:formatDate(d), mood:e.mood||0, energy:e.energy||0 }));
  const calData    = [...days].reverse().map(([d,e])=>({ d:formatDate(d), cals:(e.food||[]).reduce((s,f)=>s+(f.calories||0),0) }));
  const weightData = [...days].filter(([,e])=>e.weight).reverse().map(([d,e])=>({ d:formatDate(d), w:parseFloat(e.weight) }));
  const stepsData  = [...days].filter(([,e])=>e.fitbit?.steps).reverse().map(([d,e])=>({ d:formatDate(d), s:e.fitbit.steps }));
  const alcData    = [...days].reverse().map(([d,e])=>({ d:formatDate(d), u:parseFloat(((e.alcohol||[]).reduce((s,a)=>s+(a.units||0),0)).toFixed(1)) }));
  const bpData     = [...days].filter(([,e])=>e.bpSystolic&&e.bpDiastolic).reverse().map(([d,e])=>({ d:formatDate(d), sys:e.bpSystolic, dia:e.bpDiastolic, pulse:e.bpPulse||null }));
  const maxCals  = Math.max(...calData.map(d=>d.cals),1);
  const maxSteps = Math.max(...stepsData.map(d=>d.s),1);
  const maxAlc   = Math.max(...alcData.map(d=>d.u),1);
  const minW = Math.min(...weightData.map(d=>d.w));
  const maxW = Math.max(...weightData.map(d=>d.w));
  const minBP = Math.min(...bpData.map(d=>d.dia), 60);
  const maxBP = Math.max(...bpData.map(d=>d.sys), 160);

  const getInsights = async () => {
    setLoading(true); setError("");
    const summary = days.map(([d,e])=>({
      date:d,
      calories:(e.food||[]).reduce((s,f)=>s+(f.calories||0),0),
      meals:(e.food||[]).map(f=>f.text).join("; "),
      mood:MOODS.find(m=>m.value===e.mood)?.label,
      energy:ENERGY.find(m=>m.value===e.energy)?.label,
      moodNote:e.moodNote, exercise:e.exercise, weight:e.weight,
      bp:e.bpSystolic&&e.bpDiastolic?`${e.bpSystolic}/${e.bpDiastolic} mmHg`:null, bpPulse:e.bpPulse,
      alcoholUnits:e.alcohol?.reduce((s,a)=>s+(a.units||0),0).toFixed(1)||null,
      steps:e.fitbit?.steps, sleepMins:e.fitbit?.sleepMins, bp:e.bp?.systolic?`${e.bp.systolic}/${e.bp.diastolic}`:null, pulse:e.bp?.pulse,
      deepMins:e.fitbit?.deepMins, remMins:e.fitbit?.remMins,
      restingHR:e.fitbit?.restingHR, activeMin:e.fitbit?.activeMin,
      calsMayBeIncomplete: (() => {
        const logged = (e.food||[]).reduce((s,f)=>s+(f.calories||0),0);
        const burned = e.fitbit?.calsBurned||0;
        const slots = (e.food||[]).map(f=>f.meal);
        return (burned>0 && (burned-logged)>1200) || !slots.includes("Lunch") || !slots.includes("Dinner");
      })()
    }));
    try {
      const resp = await askClaude(
        [{ role:"user", content:JSON.stringify(summary) }],
        `You are a health coach analysing a user's food diary, mood, energy, exercise, weight, and Fitbit data (steps, sleep stages, heart rate).
Look for genuine correlations: e.g. poor sleep vs low energy/mood the next day, high step days vs mood, calorie intake vs weight trend, deep sleep vs energy levels, blood pressure trends and how they relate to exercise, sleep, or stress.
Write 4-6 specific, evidence-based bullet points from the actual data. Warm but honest. Use • for bullets. British English.`
      );
      setInsight(resp); setAnalysed(true);
    } catch(e) { setError(e.message); }
    setLoading(false);

            <polyline points={moodData.map((d,i)=>`${i*50+25},${110-(d.energy-1)*20}`).join(" ")} fill="none" stroke="#7a9ec8" strokeWidth={2.5} strokeLinejoin="round" strokeDasharray="4 2"/>
            {moodData.map((d,i)=><g key={i}><circle cx={i*50+25} cy={110-(d.mood-1)*20} r={4} fill="#c8955a"/><circle cx={i*50+25} cy={110-(d.energy-1)*20} r={4} fill="#7a9ec8"/><text x={i*50+25} y={118} textAnchor="middle" fontSize={9} fill="#a07850">{d.d.split(",")[0]}</text></g>)}

      </Section>

      {calData.some(d=>d.cals>0) && (
        <Section title="🔥 Daily Calories" accent="#c8955a">
          <div style={{ overflowX:"auto" }}>
            <svg width={Math.max(calData.length*50,300)} height={120}>
              {calData.map((d,i)=>{ const h=(d.cals/maxCals)*80; return <g key={i}><rect x={i*50+12} y={90-h} width={26} height={h} rx={4} fill={d.cals>2500?"#c87a6a":"#c8955a"} opacity={0.85}/><text x={i*50+25} y={108} textAnchor="middle" fontSize={9} fill="#a07850">{d.d.split(",")[0]}</text><text x={i*50+25} y={Math.max(88-h,14)} textAnchor="middle" fontSize={9} fill="#5a3e28">{d.cals||""}</text></g>; })}
            </svg>
          </div>
        </Section>
      )}

      {stepsData.length >= 2 && (
        <Section title="👟 Daily Steps" accent="#6a7ec8">
          <div style={{ overflowX:"auto" }}>
            <svg width={Math.max(stepsData.length*50,300)} height={120}>
              <line x1={0} x2={stepsData.length*50} y1={90-(10000/maxSteps)*80} y2={90-(10000/maxSteps)*80} stroke="#6a7ec855" strokeWidth={1} strokeDasharray="3 2"/>
              {stepsData.map((d,i)=>{ const h=(d.s/maxSteps)*80; return <g key={i}><rect x={i*50+12} y={90-h} width={26} height={h} rx={4} fill={d.s>=10000?"#6a9e6a":"#6a7ec8"} opacity={0.85}/><text x={i*50+25} y={108} textAnchor="middle" fontSize={9} fill="#a07850">{d.d.split(",")[0]}</text><text x={i*50+25} y={Math.max(88-h,14)} textAnchor="middle" fontSize={8} fill="#3d2b1a">{d.s>=1000?`${Math.round(d.s/100)/10}k`:d.s}</text></g>; })}
            </svg>
          </div>
          <div style={{ fontSize:11, color:"#a07850", marginTop:4 }}>Dashed line = 10,000 step goal · Green = goal reached</div>
        </Section>
      )}

      {weightData.length >= 2 && (
        <Section title="⚖️ Weight Trend" accent="#a07850">
          <div style={{ overflowX:"auto" }}>
            <svg width={Math.max(weightData.length*50,300)} height={120}>
              <polyline points={weightData.map((d,i)=>{const y=maxW===minW?60:100-((d.w-minW)/(maxW-minW))*80;return `${i*50+25},${y}`;}).join(" ")} fill="none" stroke="#a07850" strokeWidth={2.5} strokeLinejoin="round"/>
              {weightData.map((d,i)=>{const y=maxW===minW?60:100-((d.w-minW)/(maxW-minW))*80;return <g key={i}><circle cx={i*50+25} cy={y} r={4} fill="#a07850"/><text x={i*50+25} y={y-8} textAnchor="middle" fontSize={9} fill="#5a3e28">{d.w}</text><text x={i*50+25} y={118} textAnchor="middle" fontSize={9} fill="#a07850">{d.d.split(",")[0]}</text></g>;})}
            </svg>
          </div>
        </Section>
      )}

      {alcData.some(d=>d.u>0) && (
        <Section title="🍺 Alcohol (units)" accent="#a07850">
          <div style={{ overflowX:"auto" }}>
            <svg width={Math.max(alcData.length*50,300)} height={120}>
              {/* guideline: 14 units/week = 2 per day dashed line */}
              {(() => { const gy = 90-(2/maxAlc)*80; return <line x1={0} x2={alcData.length*50} y1={gy} y2={gy} stroke="#c87a6a55" strokeWidth={1} strokeDasharray="3 2"/>; })()}
              {alcData.map((d,i)=>{ const h=(d.u/maxAlc)*80; return (
                <g key={i}>
                  <rect x={i*50+12} y={90-h} width={26} height={h||0} rx={4}
                    fill={d.u>6?"#c87a6a":d.u>2?"#e0a060":"#6a9e6a"} opacity={0.85}/>
                  {d.u>0 && <text x={i*50+25} y={Math.max(88-h,12)} textAnchor="middle" fontSize={9} fill="#5a3e28">{d.u}</text>}

                </g>
              ); })}
            </svg>
          </div>
          <div style={{ display:"flex", gap:14, marginTop:6, fontSize:11, flexWrap:"wrap" }}>
            <span style={{color:"#6a9e6a"}}>■ ≤2 units</span>
            <span style={{color:"#e0a060"}}>■ 2–6 units</span>
            <span style={{color:"#c87a6a"}}>■ 6+ units</span>
            <span style={{color:"#c87a6a", opacity:0.6}}>-- 2u/day guideline</span>
          </div>
        </Section>
      )}

      {bpData.length >= 2 && (
        <Section title="❤️ Blood Pressure" accent="#c87a6a">
          <div style={{ overflowX:"auto" }}>
            {(() => {
              const W = Math.max(bpData.length*60, 300);
              const H = 130;
              const pad = 10;
              const chartH = 90;
              const bpRange = maxBP - minBP || 40;
              const yFor = v => pad + chartH - ((v - minBP) / bpRange) * chartH;
              // grid lines at 90, 120, 140
              const gridLines = [80, 90, 120, 140].filter(v => v >= minBP && v <= maxBP);
              return (
                <svg width={W} height={H}>
                  {gridLines.map(v => {
                    const y = yFor(v);
                    const isThresh = v===140||v===90;
                    return <g key={v}>
                      <line x1={0} x2={W} y1={y} y2={y} stroke={isThresh?"#c87a6a55":"#ecdfc8"} strokeWidth={1} strokeDasharray={isThresh?"4 2":""}/>

                  {/* Diastolic line */}
                  <polyline points={bpData.map((d,i)=>`${i*60+30},${yFor(d.dia)}`).join(" ")}
                    fill="none" stroke="#7a9ec8" strokeWidth={2.5} strokeLinejoin="round" strokeDasharray="4 2"/>
                  {/* Dots + labels */}
                  {bpData.map((d,i)=>(
                    <g key={i}>
                      <circle cx={i*60+30} cy={yFor(d.sys)} r={4} fill="#c87a6a"/>
                      <circle cx={i*60+30} cy={yFor(d.dia)} r={4} fill="#7a9ec8"/>
                      <text x={i*60+30} y={yFor(d.sys)-6} textAnchor="middle" fontSize={8} fill="#c87a6a">{d.sys}</text>
                      <text x={i*60+30} y={yFor(d.dia)+14} textAnchor="middle" fontSize={8} fill="#7a9ec8">{d.dia}</text>
                      <text x={i*60+30} y={H-4} textAnchor="middle" fontSize={9} fill="#a07850">{d.d.split(",")[0]}</text>
                    </g>
                  ))}
                </svg>
              );
            })()}
          </div>
          <div style={{ display:"flex", gap:14, marginTop:6, fontSize:12 }}>
            <span style={{color:"#c87a6a"}}>— Systolic</span>
            <span style={{color:"#7a9ec8"}}>-- Diastolic</span>
            <span style={{color:"#c87a6a", fontSize:11, opacity:0.7}}>· dashed = 140/90 threshold</span>
          </div>
        </Section>
      )}

      <Section title="✦ AI Pattern Analysis" accent="#a07850">
        <button onClick={getInsights} disabled={loading}
          style={{ padding:"10px 22px", background:"linear-gradient(135deg,#c8955a,#a07850)", color:"#fff", border:"none", borderRadius:12, fontSize:15, fontFamily:"inherit", fontWeight:700 }}>
          {loading ? "Analysing…" : "Analyse my patterns"}
        </button>
        {loading && <div style={{ marginTop:10 }}><Spinner /></div>}
        {error && <div style={{ fontSize:12, color:"#c87a6a", marginTop:6 }}>{error}</div>}
        {insight && <AIBubble text={insight} />}
        {analysed && <ChatWidget systemPrompt="You are a health coach who has analysed multi-day food, mood, energy, exercise, weight, and Fitbit data. Answer follow-up questions and give actionable advice. British English." contextSummary={`Pattern analysis: ${insight}`} placeholder="e.g. What should I focus on first? Why does my energy dip mid-week?" />}
      </Section>
    </div>
  );
}

    <div style={{ display:"flex", flexDirection:"column", gap:10 }}>

// ── Stats Bar ─────────────────────────────────────────────────────────────────
function StatsBar({ entries }) {
  const [period, setPeriod] = useState("day");
  const [stepsMode, setStepsMode] = useState("steps");   // "steps" | "miles"
  const [unitsMode, setUnitsMode] = useState("units");   // "units" | "pints"
  const [calsMode,  setCalsMode]  = useState("split");   // "split" | "net"

  const getRange = () => {
    const td = today();
    if (period === "day") return [td];
    const days = [];
    const n = period === "week" ? 7 : 30;
    for (let i = 0; i < n; i++) {
      const d = new Date(); d.setDate(d.getDate() - i);
      days.push(d.toISOString().split("T")[0]);
    }
    return days;
  };

  const range = getRange();
  const rangeEntries = range.map(d => entries[d]).filter(Boolean);

  const calsIn  = rangeEntries.reduce((s,e)=>(e.food||[]).reduce((a,f)=>a+(f.calories||0),s), 0);
  const calsOut = rangeEntries.reduce((s,e)=>s+(e.fitbit?.calsBurned||0), 0);
  const netCals = calsIn - calsOut;
  const steps   = rangeEntries.reduce((s,e)=>s+(e.fitbit?.steps||0), 0);
  const units   = rangeEntries.reduce((s,e)=>(e.alcohol||[]).reduce((a,a2)=>a+(a2.units||0),s), 0);

  // 1 mile ≈ 2000 steps (average)
  const miles = steps ? (steps / 2000).toFixed(1) : null;
  // 1 pint of average beer ≈ 2.3 units
  const pints = units ? (units / 2.3).toFixed(1) : null;

  const warnUnits = units > 14/7 * (period==="day"?1:period==="week"?7:30);

  const Divider = () => <div style={{ width:1, background:"#3a2510", margin:"4px 0" }} />;

  // Clickable stat tile
  const Stat = ({ label, value, unit, warn, onClick, clickable, icon }) => (
    <div onClick={onClick}
      style={{ flex:"1 1 0", textAlign:"center", minWidth:0, padding:"4px 2px",
               cursor: clickable ? "pointer" : "default",
               borderRadius: clickable ? 8 : 0 }}>
      {icon && <div style={{ fontSize:14, lineHeight:1, marginBottom:2 }}>{icon}</div>}
      <div style={{ fontSize:15, fontWeight:700, color: warn ? "#c87a6a" : "#f5e9d6", lineHeight:1.1 }}>
        {value}
        {unit && <span style={{ fontSize:10, fontWeight:400, marginLeft:1 }}>{unit}</span>}
      </div>
      <div style={{ fontSize:9, color: clickable ? "#e8b878" : "#c8a878", marginTop:2, letterSpacing:0.3 }}>
        {label}{clickable ? " ⇄" : ""}
      </div>
    </div>
  );

  return (
    <div style={{ background:"#2a1d0f", borderTop:"1px solid #4a3020", padding:"6px 12px 8px" }}>
      <div style={{ display:"flex", justifyContent:"center", gap:0, marginBottom:6 }}>
        {[["day","Day"],["week","Week"],["month","Month"]].map(([k,l])=>(
          <button key={k} onClick={()=>setPeriod(k)}
            style={{ padding:"3px 12px", background:period===k?"#c8955a":"transparent", color:period===k?"#fff":"#c8a878", border:"none", borderRadius:20, fontSize:11, fontFamily:"inherit", fontWeight:period===k?700:400, cursor:"pointer" }}>
            {l}
          </button>
        ))}
      </div>
      <div style={{ display:"flex", gap:0, borderTop:"1px solid #3a2510", paddingTop:6 }}>

        {/* Net cals — always visible */}
        <Stat label="NET CALS"
          value={calsIn||calsOut ? (netCals>0?"+":"")+netCals : "—"}
          unit={calsIn||calsOut?"kcal":""}
          warn={netCals>500}
          icon="⚖️" />
        <Divider />
        {/* Cals in / out — click to toggle */}
        <Stat
          label={calsMode==="split" ? "CALS IN" : "CALS OUT"}
          value={calsMode==="split" ? (calsIn||"—") : (calsOut||"—")}
          unit={(calsMode==="split" ? calsIn : calsOut) ? "kcal" : ""}
          icon={calsMode==="split" ? "🍽" : "🔥"}
          clickable onClick={()=>setCalsMode(m=>m==="split"?"net":"split")} />
        <Divider />
        {/* Steps / Miles — click to toggle */}
        <Stat
          label={stepsMode === "steps" ? "STEPS" : "MILES"}
          value={stepsMode === "steps"
            ? (steps ? (steps>=1000 ? `${(steps/1000).toFixed(1)}k` : steps) : "—")
            : (miles || "—")}
          icon={stepsMode === "steps" ? "👟" : "🗺️"}
          clickable
          onClick={()=>setStepsMode(s => s==="steps"?"miles":"steps")}
        />
        <Divider />
        {/* Units / Pints — click to toggle */}
        <Stat
          label={unitsMode === "units" ? "UNITS" : "PINTS"}
          value={unitsMode === "units" ? (units ? units.toFixed(1) : "—") : (pints || "—")}
          warn={warnUnits}
          icon="🍺"
          clickable
          onClick={()=>setUnitsMode(u => u==="units"?"pints":"units")}
        />

      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [hasKey, setHasKey] = useState(!!getApiKey());
  const [tab, setTab] = useState("log");
  const [entries, setEntries] = useState(() => {
    seedDummyData();
    return loadEntries();
  });
  const [currentDay, setCurrentDay] = useState(today());
  const [showSettings, setShowSettings] = useState(false);
  const fitbitConnected = !!getFitbitToken();

  // Handle OAuth callbacks (Fitbit uses ?code=, Google Drive uses #access_token=)
  useEffect(() => {
    // Google Drive implicit flow — token in hash
    const hash = new URLSearchParams(window.location.hash.slice(1));
    const accessToken = hash.get("access_token");
    const state = hash.get("state");
    if (accessToken && state === "gdrive_auth") {
      const expiresIn = parseInt(hash.get("expires_in") || "3600");
      saveGDriveToken({ access_token: accessToken, expires_at: Date.now() + expiresIn * 1000 });
      window.history.replaceState({}, "", window.location.pathname);
      // Trigger immediate backup
      const currentEntries = loadEntries();
      backupToDrive(currentEntries).catch(()=>{});
      return;
    }
    // Fitbit auth code flow — token in query string
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const verifier = ls.str(FB_VERIFIER_KEY);
    if (code && verifier) {
      ls.del(FB_VERIFIER_KEY);
      window.history.replaceState({}, "", window.location.pathname);
      exchangeCode(code, verifier).then(tokenData => {
        saveFitbitToken({ ...tokenData, expires_at: Date.now() + tokenData.expires_in * 1000 });
        fetchFitbitDay().then(fitbit => {
          const td = today();
          const updated = { ...loadEntries(), [td]: { ...(loadEntries()[td]||{}), fitbit } };
          saveEntries(updated);
          setEntries(updated);
          ls.setStr(FB_FETCH_KEY, td);
        }).catch(()=>{});
      }).catch(e => console.error("Token exchange failed:", e));
    }
  }, []);

  // Auto-backup to Google Drive weekly if connected
  useEffect(() => {
    if (!isGDriveConnected()) return;
    if (!shouldAutoBackup()) return;
    backupToDrive(loadEntries()).catch(()=>{});
  }, []);

  // Auto-sync Fitbit on open if connected and not yet fetched today
  useEffect(() => {
    if (!fitbitConnected) return;
    const lastFetch = ls.str(FB_FETCH_KEY);
    if (lastFetch === today()) return;
    fetchFitbitDay().then(fitbit => {
      const td = today();
      setEntries(prev => {
        const updated = { ...prev, [td]: { ...(prev[td]||{}), fitbit } };
        saveEntries(updated);
        return updated;
      });
      ls.setStr(FB_FETCH_KEY, td);
    }).catch(()=>{});
  }, []);

  const updateEntry = (data) => {
    const updated = { ...entries, [currentDay]: data };
    setEntries(updated);
    saveEntries(updated);
  };

  const selectDay = (d) => { setCurrentDay(d); setTab("log"); };

  if (!hasKey) return <ApiKeyScreen onSave={()=>setHasKey(true)} />;
  if (showSettings) return <SettingsScreen onClose={()=>setShowSettings(false)} />;

  const isToday = currentDay === today();

  return (
    <div style={{ minHeight:"100vh", background:"#fdf8f2" }}>
      <div style={{ position:"sticky", top:0, zIndex:10 }}>
      <WarningBar entries={entries} />
      <div style={{ background:"linear-gradient(135deg,#3d2b1a 0%,#6a4020 100%)", padding:"16px 16px 0" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14 }}>
          <div>
            <div style={{ fontSize:20, fontWeight:700, color:"#f5e9d6", letterSpacing:0.5 }}>
              ✦ Nourish {fitbitConnected && <span style={{ fontSize:12, color:"#aaa0d8", fontWeight:400 }}>· Fitbit ✓</span>}
            </div>
            <div style={{ fontSize:12, color:"#c8a878", marginTop:2 }}>
              {isToday?"Today — ":""}{formatDate(currentDay)}
              {!isToday && <button onClick={()=>{ setCurrentDay(today()); setTab("log"); }}
                style={{ marginLeft:8, fontSize:11, padding:"2px 8px", borderRadius:8, background:"#c8955a", color:"#fff", border:"none", fontFamily:"inherit" }}>↩ today</button>}
            </div>
          </div>
          <button onClick={()=>setShowSettings(true)} style={{ background:"none", border:"none", color:"#c8a878", fontSize:20, padding:4 }}>⚙️</button>
        </div>
        <div style={{ display:"flex" }}>
          {[["log","📋 Log"],["history","📅 History"],["insights","✦ Insights"]].map(([t,label])=>(
            <button key={t} onClick={()=>setTab(t)}
              style={{ padding:"10px 14px", background:tab===t?"#fdf8f2":"transparent", color:tab===t?"#3d2b1a":"#c8a878", border:"none", fontFamily:"inherit", fontSize:13, fontWeight:tab===t?700:400, borderRadius:"10px 10px 0 0", flex:1 }}>{label}</button>
          ))}
        </div>
      </div>
      </div>
      <StatsBar entries={entries} />
      <div style={{ maxWidth:600, margin:"0 auto", padding:"20px 14px 60px" }}>
        {tab==="log" && <LogTab entry={entries[currentDay]||{}} allEntries={entries} currentDay={currentDay} onChange={updateEntry} fitbitConnected={fitbitConnected} />}
        {tab==="history" && <HistoryTab entries={entries} onSelectDay={selectDay} />}
        {tab==="insights" && <InsightsTab entries={entries} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
