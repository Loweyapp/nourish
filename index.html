// ── Helpers ───────────────────────────────────────────────────────────────────
function today() { return new Date().toISOString().split("T")[0]; }
function r1(v) { return Math.round((v||0) * 10) / 10; } // round to 1dp
function yesterday() {
  const d = new Date(); d.setDate(d.getDate() - 1);
  return d.toISOString().split("T")[0];
}
function formatDate(d) {
  return new Date(d + "T12:00:00").toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" });
}
function fmtMins(m) {
  if (!m) return "0h 0m";
  return `${Math.floor(m/60)}h ${m%60}m`;
}

// ── LocalStorage ──────────────────────────────────────────────────────────────
const ls = {
  get: (k, fallback = null) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fallback; } catch { return fallback; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
  del: (k) => { try { localStorage.removeItem(k); } catch {} },
  str: (k) => localStorage.getItem(k) || "",
  setStr: (k, v) => localStorage.setItem(k, v),
};

function loadEntries()   { return ls.get(STORAGE_KEY, {}); }
function saveEntries(e)  { ls.set(STORAGE_KEY, e); }
function getApiKey()     { return (ls.str(API_KEY_STORAGE) || "").trim(); }
function saveApiKey(k)   { ls.setStr(API_KEY_STORAGE, k); }
function getFitbitToken(){ return ls.get(FB_TOKEN_KEY); }
function getCoachingStyle() { return ls.str(COACHING_KEY) || ""; }
function saveCoachingStyle(s) { ls.setStr(COACHING_KEY, s); }
// Session token tracking
const sessionUsage = { input: 0, output: 0 };
function trackUsage(usage) {
  if (!usage) return;
  sessionUsage.input  += usage.input_tokens  || 0;
  sessionUsage.output += usage.output_tokens || 0;
}
function estimateCost() {
  // claude-sonnet-4 pricing: ~£2.37/M input, ~£11.85/M output (at ~$1=£0.79)
  const cost = (sessionUsage.input / 1e6) * 2.37 + (sessionUsage.output / 1e6) * 11.85;
  return cost < 0.01 ? "<£0.01" : `£${cost.toFixed(3)}`;
}
function saveFitbitToken(t) { ls.set(FB_TOKEN_KEY, t); }
function clearFitbitToken() { ls.del(FB_TOKEN_KEY); ls.del(FB_FETCH_KEY); }

// ── Favourites ────────────────────────────────────────────────────────────────
function getFavourites()     { return ls.get(FAVOURITES_KEY, []); }
function saveFavourites(f)   { ls.set(FAVOURITES_KEY, f); }
function addFavourite(fav)   {
  const favs = getFavourites();
  if (favs.find(f => f.text.toLowerCase() === fav.text.toLowerCase())) return; // no dupes
  saveFavourites([...favs, { ...fav, useCount: 0 }]);
}
function incrementFavUseCount(texts) {
  // texts is an array of favourite text strings that were just used
  const favs = getFavourites().map(f =>
    texts.includes(f.text) ? { ...f, useCount: (f.useCount || 0) + 1 } : f
  );
  // Re-sort by useCount descending
  favs.sort((a, b) => (b.useCount || 0) - (a.useCount || 0));
  saveFavourites(favs);
}
function removeFavourite(text) {
  saveFavourites(getFavourites().filter(f => f.text !== text));
}

// ── Google Drive ──────────────────────────────────────────────────────────────
function getGDriveToken()   { return ls.get(GDRIVE_TOKEN_KEY); }
function saveGDriveToken(t) { ls.set(GDRIVE_TOKEN_KEY, t); }
function clearGDriveToken() { ls.del(GDRIVE_TOKEN_KEY); }
function getLastBackup()    { return ls.str(GDRIVE_LAST_BACKUP); }

function isGDriveConnected() {
  const t = getGDriveToken();
  if (!t) return false;
  if (t.expires_at && Date.now() > t.expires_at - 60000) { clearGDriveToken(); return false; }
  return true;
}

function startGDriveAuth() {
  const params = new URLSearchParams({
    client_id:     GDRIVE_CLIENT_ID,
    redirect_uri:  REDIRECT_URI,
    response_type: "token",
    scope:         GDRIVE_SCOPE,
    state:         "gdrive_auth",
    prompt:        "consent",
  });
  window.location.href = "https://accounts.google.com/o/oauth2/v2/auth?" + params;
}

async function findOrCreateFolder(token) {
  const q = encodeURIComponent("name='Nourish Backups' and mimeType='application/vnd.google-apps.folder' and trashed=false");
  const search = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`, {
    headers: { Authorization: "Bearer " + token }
  });
  if (search.status === 401) { clearGDriveToken(); throw new Error("Google session expired — please reconnect"); }
  const data = await search.json();
  if (data.files?.length) return data.files[0].id;
  const create = await fetch("https://www.googleapis.com/drive/v3/files", {
    method: "POST",
    headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },
    body: JSON.stringify({ name: "Nourish Backups", mimeType: "application/vnd.google-apps.folder" })
  });
  if (!create.ok) throw new Error("Could not create Nourish Backups folder: " + create.status);
  const folder = await create.json();
  return folder.id;
}

async function backupToDrive(entries) {
  const tokenData = getGDriveToken();
  if (!tokenData?.access_token) throw new Error("Not connected to Google Drive");
  if (tokenData.expires_at && Date.now() > tokenData.expires_at - 60000) {
    clearGDriveToken();
    throw new Error("Google session expired — please reconnect in Settings");
  }
  const token    = tokenData.access_token;
  const folderId = await findOrCreateFolder(token);
  const date     = new Date().toISOString().split("T")[0];
  const filename = `nourish-backup-${date}.json`;
  const content  = JSON.stringify({ exportedAt: new Date().toISOString(), entries }, null, 2);

  // Multipart upload so we can set metadata (name + parent) in one request
  const boundary = "nourish_bnd_" + Math.random().toString(36).slice(2);
  const body = [
    `--${boundary}\r\n`,
    `Content-Type: application/json\r\n\r\n`,
    JSON.stringify({ name: filename, parents: [folderId] }) + "\r\n",
    `--${boundary}\r\n`,
    `Content-Type: application/json\r\n\r\n`,
    content + "\r\n",
    `--${boundary}--`
  ].join("");

  const res = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart", {
    method: "POST",
    headers: {
      Authorization: "Bearer " + token,
      "Content-Type": `multipart/related; boundary=${boundary}`
    },
    body
  });
  if (res.status === 401) { clearGDriveToken(); throw new Error("Google session expired — please reconnect"); }
  if (!res.ok) throw new Error(`Backup failed (HTTP ${res.status})`);
  ls.setStr(GDRIVE_LAST_BACKUP, new Date().toISOString());
  return filename;
}

function shouldAutoBackup() {
  const last = getLastBackup();
  if (!last) return true;
  const daysSince = (Date.now() - new Date(last).getTime()) / (1000 * 60 * 60 * 24);
  return daysSince >= BACKUP_INTERVAL_DAYS;
}

function seedDummyData() {
  if (ls.str(DUMMY_SEEDED_KEY) === "cleared") return; // user explicitly cleared
  const entries = loadEntries();
  const alcDays = [
    [],
    [{ text:"2 pints of lager (4%)", units:4.6 }],
    [],
    [{ text:"Glass of red wine (175ml, 13%)", units:2.3 }],
    [],
    [{ text:"3 pints of lager (4%), double gin & tonic", units:8.9 }],
    [{ text:"Bottle of beer (330ml, 5%)", units:1.65 }],
  ];
  const bpData = [
    { sys:128, dia:84, pulse:68 },
    { sys:132, dia:86, pulse:72 },
    { sys:126, dia:82, pulse:65 },
    { sys:135, dia:88, pulse:75 },
    { sys:124, dia:80, pulse:64 },
    { sys:138, dia:90, pulse:78 },
    { sys:129, dia:83, pulse:70 },
  ];
  let changed = false;
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const dateStr = d.toISOString().split("T")[0];
    const idx = 6 - i;
    const existing = entries[dateStr] || {};
    // Only add BP if not already set
    const needsBP  = !existing.bpSystolic;
    // Only add alcohol if not already set
    const needsAlc = !existing.alcohol?.length && alcDays[idx].length > 0;
    if (needsBP || needsAlc) {
      entries[dateStr] = {
        ...existing,
        ...(needsBP  ? { bpSystolic: bpData[idx].sys, bpDiastolic: bpData[idx].dia, bpPulse: bpData[idx].pulse } : {}),
        ...(needsAlc ? { alcohol: alcDays[idx] } : {}),
      };
      changed = true;
    }
  }
  if (changed) saveEntries(entries);
  ls.setStr(DUMMY_SEEDED_KEY, "1");
  return changed ? entries : null;
}

function clearDummyData() {
  ls.setStr(DUMMY_SEEDED_KEY, "cleared");

async function askClaude(messages, systemPrompt) {
  const key = getApiKey();
  if (!key) throw new Error("No API key");
  const coaching = getCoachingStyle();
  const fullSystem = systemPrompt + (coaching ? `

Personal coaching preferences from the user: ${coaching}` : "");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: fullSystem, messages }),
  });
  const raw = await res.text();
  let data; try { data = JSON.parse(raw); } catch { throw new Error(`Bad response: ${raw.slice(0,100)}`); }
  if (!res.ok || data.error) throw new Error(data.error?.message || `HTTP ${res.status}`);
  trackUsage(data.usage);
  return data.content?.[0]?.text || "";
}

// ── Fitbit OAuth (PKCE) ───────────────────────────────────────────────────────
function b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");
}
async function pkce() {
  const verifier = b64url(crypto.getRandomValues(new Uint8Array(32)));
  const challenge = b64url(await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier)));
  return { verifier, challenge };
}
function fitbitAuthUrl(challenge) {
  const p = new URLSearchParams({
    response_type: "code", client_id: FITBIT_CLIENT_ID,
    redirect_uri: REDIRECT_URI, scope: FITBIT_SCOPES,
    code_challenge: challenge, code_challenge_method: "S256",
    expires_in: "604800"
  });
  return "https://www.fitbit.com/oauth2/authorize?" + p;
}
async function exchangeCode(code, verifier) {
  const res = await fetch("https://api.fitbit.com/oauth2/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({ client_id: FITBIT_CLIENT_ID, grant_type: "authorization_code", redirect_uri: REDIRECT_URI, code, code_verifier: verifier })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.errors?.[0]?.message || "Token exchange failed");
  return data;
}
async function refreshFitbitToken() {
  const stored = getFitbitToken();
  if (!stored?.refresh_token) return null;
  const res = await fetch("https://api.fitbit.com/oauth2/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({ client_id: FITBIT_CLIENT_ID, grant_type: "refresh_token", refresh_token: stored.refresh_token })
  });
  const data = await res.json();
  if (!res.ok) { clearFitbitToken(); return null; }
  const token = { ...data, expires_at: Date.now() + data.expires_in * 1000 };
  saveFitbitToken(token);
  return token.access_token;
}
async function getFitbitAccessToken() {
  const stored = getFitbitToken();
  if (!stored) return null;
  if (stored.expires_at && Date.now() < stored.expires_at - 60000) return stored.access_token;
  return await refreshFitbitToken();
}
const FITBIT_PROXY = "https://rapid-star-52f2.alexlowe1.workers.dev/fitbit";

async function fitbitGet(path) {
  const token = await getFitbitAccessToken();
  if (!token) throw new Error("No Fitbit token — please reconnect");
  let res;
  try {
    res = await fetch(FITBIT_PROXY + path, { headers: { Authorization: "Bearer " + token } });
  } catch(netErr) {
    throw new Error("Network error: " + (netErr.message || String(netErr)));
  }
  if (res.status === 401) { clearFitbitToken(); throw new Error("Fitbit token expired — please reconnect"); }
  let data; try { data = await res.json(); } catch { throw new Error("Bad response from proxy (HTTP " + res.status + ")"); }
  if (!res.ok) throw new Error(data.errors?.[0]?.message || "Fitbit error " + res.status);
  return data;
}

// Fetch today's Fitbit data
async function fetchFitbitDay() {
  const actSum    = await fitbitGet("/1/user/-/activities/date/" + today() + ".json");
  const sleepData = await fitbitGet("/1.2/user/-/sleep/date/" + today() + ".json");
  const hrData    = await fitbitGet("/1/user/-/activities/heart/date/" + today() + "/1d.json");

  const steps        = actSum.summary?.steps ?? 0;
  const activeMin    = actSum.summary?.fairlyActiveMinutes + actSum.summary?.veryActiveMinutes ?? 0;
  const calsBurned   = actSum.summary?.caloriesOut ?? 0;
  const restingHR    = hrData["activities-heart"]?.[0]?.value?.restingHeartRate ?? null;

  // Sleep: Fitbit returns sleep that ended on the date (i.e. last night)
  const mainSleep    = sleepData.sleep?.find(s => s.isMainSleep) || sleepData.sleep?.[0];
  const sleepMins    = mainSleep?.minutesAsleep ?? 0;
  const deepMins     = mainSleep?.levels?.summary?.deep?.minutes ?? 0;
  const remMins      = mainSleep?.levels?.summary?.rem?.minutes ?? 0;
  const lightMins    = mainSleep?.levels?.summary?.light?.minutes ?? 0;
  const awakeMins    = mainSleep?.levels?.summary?.wake?.minutes ?? 0;
  const sleepStart   = mainSleep?.startTime ?? null;
  const sleepEnd     = mainSleep?.endTime ?? null;

  return { steps, activeMin, calsBurned, restingHR, sleepMins, deepMins, remMins, lightMins, awakeMins, sleepStart, sleepEnd, fetchedAt: Date.now() };
}

// ── Day context ───────────────────────────────────────────────────────────────
function buildDayContext(entry) {
  if (!entry) return "No data logged today yet.";
  const parts = [];
  if (entry.food?.length) {
    const totalCals = entry.food.reduce((s, f) => s + (f.calories || 0), 0);
    parts.push(`Food: ${entry.food.map(f => `${f.meal}: ${f.text} (${f.calories} kcal)`).join("; ")}. Total: ${totalCals} kcal.`);
  }
  if (entry.mood)     parts.push(`Mood: ${MOODS.find(m => m.value === entry.mood)?.label}.`);
  if (entry.energy)   parts.push(`Energy: ${ENERGY.find(e => e.value === entry.energy)?.label}.`);
  if (entry.moodNote) parts.push(`Wellbeing notes: "${entry.moodNote}".`);
  if (entry.exercise) parts.push(`Exercise: ${entry.exercise}.`);
  if (entry.weight)   parts.push(`Weight: ${entry.weight}kg.`);
  if (entry.bp?.systolic) parts.push(`Blood pressure: ${entry.bp.systolic}/${entry.bp.diastolic} mmHg.`);
  if (entry.bpSystolic && entry.bpDiastolic) parts.push(`Blood pressure: ${entry.bpSystolic}/${entry.bpDiastolic} mmHg${entry.bpPulse ? `, pulse ${entry.bpPulse} bpm` : ""}.`);
  if (entry.alcohol?.length) {
    const totalUnits = entry.alcohol.reduce((s,a)=>s+(a.units||0),0).toFixed(1);
    parts.push(`Alcohol: ${entry.alcohol.map(a=>a.text).join(", ")}. Total units: ${totalUnits}.`);
  }
  if (entry.fitbit) {
    const f = entry.fitbit;
    if (f.steps)     parts.push(`Steps: ${f.steps.toLocaleString()}.`);
    if (f.sleepMins) parts.push(`Sleep last night: ${fmtMins(f.sleepMins)} (deep ${fmtMins(f.deepMins)}, REM ${fmtMins(f.remMins)}, light ${fmtMins(f.lightMins)}).`);
    if (f.restingHR) parts.push(`Resting heart rate: ${f.restingHR} bpm.`);
    if (f.activeMin) parts.push(`Active minutes: ${f.activeMin}.`);
    if (f.calsBurned)parts.push(`Calories burned (total): ${f.calsBurned}.`);
  }
  const base = parts.length ? parts.join(" ") : "No data logged today yet.";
  return base + getCompletenessNote(entry);
}

// ── Meal completeness checker ────────────────────────────────────────────────
function getMealWarnings(entry) {
  const now = new Date();
  const timeDecimal = now.getHours() + now.getMinutes() / 60;
  const food = entry?.food || [];
  const loggedCals = food.reduce((s, f) => s + (f.calories || 0), 0);
  const warnings = [];

  // After 10:30am with nothing logged yet
  if (timeDecimal >= 10.5 && loggedCals === 0) {
    warnings.push({ type: "meal", msg: "Nothing logged yet today — don't forget to add what you've eaten." });
  }

  // After 1:30pm and very few calories (under 300 — likely only a snack logged)
  if (timeDecimal >= 13.5 && loggedCals > 0 && loggedCals < 300) {
    warnings.push({ type: "meal", msg: `Only ${loggedCals} kcal logged by lunchtime — are some meals missing?` });
  }

  // After 8pm and still low (under 600 kcal — probably dinner not yet logged)
  if (timeDecimal >= 20.0 && loggedCals < 600) {
    warnings.push({ type: "meal", msg: `Only ${loggedCals} kcal logged — if you've had dinner, don't forget to add it. You can always roll earlier meals in with dinner.` });
  }

  // Fitbit deficit check: if Fitbit burned > logged + 1200
  const burned = entry?.fitbit?.calsBurned || 0;
  if (burned > 0 && (burned - loggedCals) > 1200) {
    warnings.push({ type: "fitbit", msg: `Fitbit shows ${burned} kcal burned but only ${loggedCals} kcal logged — some meals may be missing.` });
  }

  return warnings;
}

// Build a completeness note for Claude context
function getCompletenessNote(entry) {
  const warnings = getMealWarnings(entry);
  if (!warnings.length) return "";
  const slots = warnings.filter(w => w.type === "meal").map(w => w.slot);
  const fitbitWarn = warnings.find(w => w.type === "fitbit");
  const parts = [];
  if (slots.length) parts.push(`Possibly missing meals: ${slots.join(", ")}`);
  if (fitbitWarn) parts.push(fitbitWarn.msg);
  return `

DATA COMPLETENESS WARNING: ${parts.join(". ")}. The logged calorie total may be significantly understated. Factor this uncertainty into your analysis — do not treat the logged figure as accurate.`;
}

function Spinner({ small, label }) {

      {label || (!small && "Claude is thinking…")}
    </div>
  );
}
function AIBubble({ text, loading }) {
  if (loading) return <div style={{ marginTop:10 }}><Spinner /></div>;
  if (!text) return null;
  return (
    <div style={{ marginTop:10, padding:"14px 16px", background:"#f8f8f8", borderLeft:"3px solid #9ebd6e", borderRadius:"0 12px 12px 0", fontSize:14, lineHeight:1.7, color:"#333333", whiteSpace:"pre-wrap" }}>
      <span style={{ fontSize:12, fontWeight:700, letterSpacing:1, color:"#767676", display:"block", marginBottom:4 }}>✦ AI INSIGHT</span>
      {text}
    </div>
  );
}
function ChatWidget({ systemPrompt, contextSummary, placeholder="Ask a follow-up…" }) {
  const [history, setHistory] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const bottomRef = useRef(null);
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [history, loading]);
  const send = async () => {
    if (!input.trim() || loading) return;
    const userMsg = { role:"user", content:input.trim() };
    setInput(""); setLoading(true); setError("");
    const msgs = contextSummary
      ? [{ role:"user", content:"Please acknowledge the context." }, { role:"assistant", content:contextSummary }, ...history, userMsg]
      : [...history, userMsg];
    try { const reply = await askClaude(msgs, systemPrompt); setHistory(p => [...p, userMsg, { role:"assistant", content:reply }]); }
    catch(e) { setError(e.message); }
    setLoading(false);
  };
  return (
    <div style={{ marginTop:12, borderTop:"1px solid #efefef", paddingTop:12 }}>
      <div style={{ fontSize:12, fontWeight:700, color:"#767676", letterSpacing:1, marginBottom:8 }}>💬 ASK A FOLLOW-UP</div>
      {history.length > 0 && (
        <div style={{ maxHeight:260, overflowY:"auto", marginBottom:10, display:"flex", flexDirection:"column", gap:8 }}>
          {history.map((m,i) => (
            <div key={i} style={{ alignSelf:m.role==="user"?"flex-end":"flex-start", maxWidth:"85%", padding:"8px 12px", borderRadius:m.role==="user"?"14px 14px 4px 14px":"14px 14px 14px 4px", background:m.role==="user"?"#9ebd6e":"#f0f0f0", color:m.role==="user"?"#fff":"#333333", fontSize:13.5, lineHeight:1.55, whiteSpace:"pre-wrap" }}>{m.content}</div>
          ))}
          {loading && <div style={{ alignSelf:"flex-start", padding:"8px 12px", background:"#f0f0f0", borderRadius:"14px 14px 14px 4px" }}><Spinner small /></div>}
          <div ref={bottomRef} />
        </div>
      )}
      {error && <div style={{ fontSize:12, color:"#111111", marginBottom:6 }}>{error}</div>}
      <div style={{ display:"flex", gap:8 }}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} }} placeholder={placeholder}
          style={{ flex:1, padding:"10px 13px", borderRadius:10, border:"1.5px solid #efefef", background:"#fff", fontFamily:"inherit", fontSize:14, color:"#111111", outline:"none" }} />
        <button onClick={send} disabled={!input.trim()||loading}
          style={{ padding:"10px 16px", background:"#9ebd6e", color:"#fff", border:"none", borderRadius:10, fontSize:18, fontFamily:"inherit", fontWeight:700 }}>↑</button>
      </div>
    </div>
  );
}

function FoodSection({ foodItems, onUpdate, alcoholItems, onAlcoholUpdate, dayContext, fitbitData }) {
  const [text, setText] = useState("");
  const [loading, setLoading] = useState(false);
  const [imageLoading, setImageLoading] = useState(false);
  const [pending, setPending] = useState(null);   // food pending
  const [pendingDrink, setPendingDrink] = useState(null); // alcohol pending
  const [pendingTime, setPendingTime] = useState("");
  const [previewSrc, setPreviewSrc] = useState(null);
  const [error, setError] = useState("");
  const [showFavs, setShowFavs] = useState(false);
  const [showAllItems, setShowAllItems] = useState(false);
  const [selectedFavs, setSelectedFavs] = useState([]); // texts of checked favourites
  const [favourites, setFavourites] = useState(()=>getFavourites());
  const textareaRef = useRef(null);

  const resizeImage = (file) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Failed to read file"));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error("Failed to decode image"));
      img.onload = () => {
        const MAX = 1024;
        let { width: w, height: h } = img;
        if (w > MAX || h > MAX) { if (w > h) { h = Math.round(h*MAX/w); w=MAX; } else { w=Math.round(w*MAX/h); h=MAX; } }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve({ b64: canvas.toDataURL("image/jpeg", 0.85).split(",")[1], mediaType:"image/jpeg" });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });

  const handleImage = async (file) => {
    if (!file) return;
    setImageLoading(true); setPending(null); setPendingDrink(null); setText(""); setError("");
    const pr = new FileReader(); pr.onload = e => setPreviewSrc(e.target.result); pr.readAsDataURL(file);
    try {
      const { b64, mediaType } = await resizeImage(file);
      const key = getApiKey();
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "x-api-key":key, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
        body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:400,
          messages:[{ role:"user", content:[
            { type:"image", source:{ type:"base64", media_type:mediaType, data:b64 } },
            { type:"text", text:"Describe what you see in this image. It could be food, a drink, or both. If it's a food: include estimated portions (e.g. '2 scrambled eggs on toast'). If it's an alcoholic drink or bottle/can label: include the drink type, volume, and ABV% if visible on the label (e.g. 'pint of Guinness 4.2%', '175ml glass of red wine approx 13%', '330ml can of Stella Artois 5%'). Be concise — just the description, no other commentary." }
          ]}]
        })
      });
      const raw = await resp.text();
      let data; try { data = JSON.parse(raw); } catch { throw new Error("Bad response"); }
      if (!resp.ok || data.error) throw new Error(data.error?.message || `HTTP ${resp.status}`);
      setText(data.content?.[0]?.text || "");
    } catch(e) { setError("Couldn't identify: " + (e?.message || String(e))); }
    setImageLoading(false);
  };

  // Smart analyse — handles single items, drinks, or multi-meal descriptions
  const analyse = async () => {
    if (!text.trim()) return;
    setLoading(true); setPending(null); setPendingDrink(null); setError("");
    const nowHour = new Date().getHours();
    setPendingTime(`${String(nowHour).padStart(2,"0")}:00`);
    try {
      const resp = await askClaude(
        [{ role:"user", content:`User entry: "${text}"` }],
        `You are a nutrition and drinks expert. The user may enter a single item or multiple meals at once, e.g. "Lunch 2 eggs and salad. Dinner steak and broccoli."

Return ONLY valid JSON, no markdown.

CRITICAL RULES:
- "type" must be "alcohol" ONLY if the drink contains alcohol (beer, wine, spirits, cider etc). Non-alcoholic drinks (water, juice, tea, coffee, coke, lemonade etc) are type "food".
- "type" is "both" ONLY if the entry contains BOTH food AND an alcoholic drink.
- "units" must be 0 for anything non-alcoholic. Never assign units to soft drinks, juices, or other non-alcoholic beverages.
- UK alcohol units = (volume_ml * abv%) / 1000

If SINGLE food or drink:
{"multi":false,"type":"food"|"alcohol"|"both","calories":<n>,"protein_g":<n>,"carbs_g":<n>,"fat_g":<n>,"units":<n>,"drink_type":"<or null>","abv":<n or null>,"volume_ml":<n or null>,"commentary":"<2-3 sentences>"}

If MULTIPLE meals/items:
{"multi":true,"items":[{"text":"<description>","type":"food"|"alcohol"|"both","suggested_time":"<HH:00 best guess e.g. 08:00 for breakfast, 13:00 for lunch, 19:00 for dinner>","calories":<n>,"protein_g":<n>,"carbs_g":<n>,"fat_g":<n>,"units":<n>,"drink_type":"<or null>","abv":<n or null>,"volume_ml":<n or null>}],"commentary":"<2-3 sentence overall summary>"}

User's day so far: ${dayContext}
Accuracy rules:
- Assume typical UK restaurant/home portions unless the user specifies (e.g. "large", "small", "half")
- For branded items (e.g. "Big Mac", "Pret tuna baguette") use the actual published nutritional values
- For homemade dishes, assume standard UK recipe quantities
- Never round calories to the nearest 100 — give a realistic specific estimate
- If the description is ambiguous about portion size, assume a standard adult portion
Be realistic. UK measurements and British English.`
      );
      const parsed = JSON.parse(resp.replace(/` + "```" + `json|` + "```" + `/g,"").trim());
      if (parsed.multi) {
        const newFood = [], newDrinks = [];
        for (const item of parsed.items) {
          const t = item.suggested_time || "12:00";
          const rounded = { ...item, calories: r1(item.calories), protein_g: r1(item.protein_g), carbs_g: r1(item.carbs_g), fat_g: r1(item.fat_g), units: r1(item.units), time: t };
          if (item.type === "alcohol") newDrinks.push(rounded);
          else if (item.type === "both") { newFood.push(rounded); newDrinks.push(rounded); }
          else newFood.push(rounded);
        }
        if (newFood.length)   onUpdate([...foodItems, ...newFood]);
        if (newDrinks.length) onAlcoholUpdate([...alcoholItems, ...newDrinks]);
        const totalCals = parsed.items.reduce((s,i)=>s+(i.calories||0),0);
        const totalProt = r1(parsed.items.reduce((s,i)=>s+(i.protein_g||0),0));
        const totalCarb = r1(parsed.items.reduce((s,i)=>s+(i.carbs_g||0),0));
        const totalFat  = r1(parsed.items.reduce((s,i)=>s+(i.fat_g||0),0));
        setPending({ _multiSummary:true, commentary:parsed.commentary, calories:totalCals, protein_g:totalProt, carbs_g:totalCarb, fat_g:totalFat });
        setText("");
      } else {
        const rp = { ...parsed, calories: r1(parsed.calories), protein_g: r1(parsed.protein_g), carbs_g: r1(parsed.carbs_g), fat_g: r1(parsed.fat_g), units: r1(parsed.units), text: text.trim() };
        if (parsed.type === "alcohol") setPendingDrink(rp);
        else if (parsed.type === "both") { setPending(rp); setPendingDrink(rp); }
        else setPending(rp);
      }
    } catch(e) { setError(e.message || "Couldn't analyse — try being more specific."); }
    setLoading(false);
  };

  // Auto-submit a favourite — runs it straight through analyse then adds
  // Direct-add selected favourites — no AI call needed, calories already stored
  const addSelectedFavourites = () => {
    if (!selectedFavs.length) return;
    const nowHour = new Date().getHours();
    const nowTime = String(nowHour).padStart(2,"0") + ":00";
    const toAdd = favourites.filter(f => selectedFavs.includes(f.text));
    const newFood = [];
    const newDrinks = [];
    toAdd.forEach(fav => {
      const item = {
        text: fav.text,
        calories: fav.calories || 0,
        protein_g: fav.protein_g || 0,
        carbs_g: fav.carbs_g || 0,
        fat_g: fav.fat_g || 0,
        units: fav.units || 0,
        time: nowTime,
      };
      if (fav.units > 0) {
        newDrinks.push(item);
      } else {
        newFood.push(item);
      }
    });
    if (newFood.length)   onUpdate([...foodItems, ...newFood]);
    if (newDrinks.length) onAlcoholUpdate([...alcoholItems, ...newDrinks]);
    // Increment use counts and re-sort
    incrementFavUseCount(selectedFavs);
    setFavourites(getFavourites());
    setSelectedFavs([]);
    setShowFavs(false);
  };

  const toggleFavSelection = (text) => {
    setSelectedFavs(prev =>
      prev.includes(text) ? prev.filter(t => t !== text) : [...prev, text]
    );
  };

  // Save current pending item as a favourite (store full nutrition for direct-add)
  const saveAsFavourite = () => {
    if (!pending?.text) return;
    addFavourite({
      text: pending.text,
      calories: pending.calories || 0,
      protein_g: pending.protein_g || 0,
      carbs_g: pending.carbs_g || 0,
      fat_g: pending.fat_g || 0,
      units: pendingDrink?.units || 0,
    });
    setFavourites(getFavourites());
  };

  const addItem = () => {
    const nowTime = pendingTime;
    if (pending) {
      onUpdate([...foodItems, { ...pending, time: nowTime }]);
    }
    if (pendingDrink) {
      onAlcoholUpdate([...alcoholItems, { ...pendingDrink, time: nowTime }]);
    }
    setText(""); setPending(null); setPendingDrink(null); setPendingTime(""); setPreviewSrc(null);
  };

  const removeFood = (i) => onUpdate(foodItems.filter((_,idx)=>idx!==i));
  const removeDrink = (i) => onAlcoholUpdate(alcoholItems.filter((_,idx)=>idx!==i));
  const updateFoodTime = (i, t) => onUpdate(foodItems.map((f,idx)=>idx===i?{...f,time:t}:f));
  const updateDrinkTime = (i, t) => onAlcoholUpdate(alcoholItems.map((a,idx)=>idx===i?{...a,time:t}:a));

  const totalCals = foodItems.reduce((s,f)=>s+(f.calories||0),0);
  const totalUnits = alcoholItems.reduce((s,a)=>s+(a.units||0),0);

  const isPending = pending || pendingDrink;
  const chatCtx = pending
    ? `Item: "${pending.text}". ${pending.calories} kcal, ${pending.protein_g}g protein, ${pending.carbs_g}g carbs, ${pending.fat_g}g fat${pendingDrink ? `, ${pendingDrink.units} alcohol units` : ""}. Assessment: ${pending.commentary}`
    : pendingDrink ? `Drink: "${pendingDrink.text}". ${pendingDrink.units} units, ${pendingDrink.calories} kcal. ${pendingDrink.commentary}` : null;

  // Combine food + drink items for unified timeline
  const allItems = [
    ...foodItems.map((f,i) => ({ ...f, _type:"food", _i:i })),
    ...alcoholItems.map((a,i) => ({ ...a, _type:"drink", _i:i }))
  ].sort((a,b) => (a.time||"").localeCompare(b.time||""));

  const renderLogItem = (item, idx, key) => item._type === "food" ? (
    <div key={`${key}-f${item._i}-${idx}`} style={{ padding:"12px 0", borderBottom:"1px solid #f5f5f5" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
        <div style={{ flex:1, minWidth:0, paddingRight:8 }}>
          <div style={{ fontWeight:600, color:"#111111", fontSize:14, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.text}</div>
          <div style={{ display:"flex", alignItems:"center", gap:4, marginTop:3 }}>
            <HourSelect value={item.time||"08:00"} onChange={t=>updateFoodTime(item._i,t)} />
            {item.meal && <span style={{ fontSize:12, color:"#767676" }}>· {item.meal}</span>}
          </div>
          {(item.protein_g||item.carbs_g||item.fat_g) ? (
            <div style={{ display:"flex", gap:5, marginTop:6, flexWrap:"wrap" }}>
              {item.protein_g>0 && <span style={{ fontSize:12, padding:"2px 8px", borderRadius:20, background:"#edfaf2", color:"#2d6a3f", fontWeight:600 }}>{Math.round(item.protein_g)}g P</span>}
              {item.carbs_g>0 && <span style={{ fontSize:12, padding:"2px 8px", borderRadius:20, background:"#eef4ff", color:"#1a4090", fontWeight:600 }}>{Math.round(item.carbs_g)}g C</span>}
              {item.fat_g>0 && <span style={{ fontSize:12, padding:"2px 8px", borderRadius:20, background:"#ffeef4", color:"#801030", fontWeight:600 }}>{Math.round(item.fat_g)}g F</span>}
            </div>
          ) : null}
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontWeight:700, color:"#111111", fontSize:18, lineHeight:1 }}>{item.calories}</div>
            <div style={{ fontSize:12, color:"#767676", marginTop:1 }}>kcal</div>
          </div>
          <button onClick={()=>removeFood(item._i)} style={{ background:"none", border:"none", color:"#999999", fontSize:18, lineHeight:1, padding:"0 2px", marginTop:2 }}>×</button>
        </div>
      </div>
    </div>
  ) : (
    <div key={`${key}-d${item._i}-${idx}`} style={{ padding:"12px 0", borderBottom:"1px solid #f5f5f5" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
        <div style={{ flex:1, minWidth:0, paddingRight:8 }}>
          <div style={{ fontWeight:600, color:"#111111", fontSize:14, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.drink_type || item.text}</div>
          <div style={{ display:"flex", alignItems:"center", gap:4, marginTop:3 }}>
            <HourSelect value={item.time||"08:00"} onChange={t=>updateDrinkTime(item._i,t)} />
            <span style={{ fontSize:12, color:"#767676", display:"flex", alignItems:"center", gap:3 }}>· <Icon name="beer" size={15} color="#767676"/> Drink</span>
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:6, flexShrink:0 }}>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontWeight:700, color:"#111111", fontSize:18, lineHeight:1 }}>{(item.units||0).toFixed(1)}u</div>
            <div style={{ fontSize:12, color:"#767676", marginTop:1 }}>units</div>
          </div>
          <button onClick={()=>removeDrink(item._i)} style={{ background:"none", border:"none", color:"#999999", fontSize:18, lineHeight:1, padding:"0 2px", marginTop:2 }}>×</button>
        </div>
      </div>
    </div>
  );

  return (
    <Section title="FOOD & DRINK" accent="#9ebd6e">
      {totalCals > 0 && <FoodSummaryHeader foodItems={foodItems} totalCals={totalCals} />}

      <input id="nourish-camera" type="file" accept="image/*" capture="environment" style={{ display:"none" }}
        onChange={e=>{ handleImage(e.target.files?.[0]); e.target.value=""; }} />
      <input id="nourish-gallery" type="file" accept="image/*" style={{ display:"none" }}
        onChange={e=>{ handleImage(e.target.files?.[0]); e.target.value=""; }} />
      <div style={{ display:"flex", gap:8, marginBottom:12 }}>
        <label htmlFor="nourish-camera"
          style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:5, padding:"12px 8px", borderRadius:10, border:"1.5px solid #efefef", background:"#f9f9f9", color:"#767676", fontSize:12, fontFamily:"inherit", userSelect:"none", fontWeight:500, cursor:"pointer" }}>
          <Icon name="camera" size={22} color="#767676"/>
          <span>Camera</span>
        </label>
        <label htmlFor="nourish-gallery"
          style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:5, padding:"12px 8px", borderRadius:10, border:"1.5px solid #efefef", background:"#f9f9f9", color:"#767676", fontSize:12, fontFamily:"inherit", userSelect:"none", fontWeight:500, cursor:"pointer" }}>
          <Icon name="gallery" size={22} color="#767676"/>
          <span>Gallery</span>
        </label>
        <button onClick={()=>setShowFavs(v=>!v)}
          style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:5, padding:"12px 8px", borderRadius:10, border: showFavs||selectedFavs.length>0 ? "1.5px solid #9ebd6e" : "1.5px solid #efefef", background: showFavs||selectedFavs.length>0 ? "#f5f5f5" : "#f9f9f9", color: showFavs||selectedFavs.length>0 ? "#9ebd6e" : "#767676", fontSize:12, fontFamily:"inherit", fontWeight:500, cursor:"pointer" }}>
          {selectedFavs.length > 0
            ? <><Icon name="star" size={22} color="#9ebd6e"/><span>{selectedFavs.length} selected</span></>
            : <><Icon name="star" size={22} color={showFavs?"#9ebd6e":"#767676"}/><span>Saved</span></>
          }
        </button>
      </div>

      {imageLoading && <div style={{ marginBottom:10 }}><Spinner label="Identifying…" /></div>}
      {previewSrc && !imageLoading && (
        <div style={{ marginBottom:10, display:"flex", gap:10, alignItems:"flex-start" }}>
          <img src={previewSrc} alt="item" style={{ width:72, height:72, objectFit:"cover", borderRadius:10, border:"1.5px solid #efefef", flexShrink:0 }} />
          <div style={{ fontSize:12, color:"#767676", lineHeight:1.5, paddingTop:2 }}>Identified — edit below if needed, then tap Analyse.</div>
        </div>
      )}

      {/* Favourites dropdown with checkboxes */}
      {favourites.length > 0 && (
        <div style={{ marginBottom:8, position:"relative" }}>
          {showFavs && (
            <div style={{ position:"absolute", top:"100%", left:0, right:0, zIndex:20, background:"#fff", border:"1.5px solid #efefef", borderRadius:10, boxShadow:"0 4px 16px #9ebd6e22", marginTop:4, maxHeight:260, overflowY:"auto" }}>
              {favourites.map((fav, i) => {
                const checked = selectedFavs.includes(fav.text);
                return (
                  <div key={i} onClick={()=>toggleFavSelection(fav.text)}
                    style={{ display:"flex", alignItems:"center", gap:12, padding:"11px 14px", cursor:"pointer",
                      background: checked ? "#f5f5f5" : "none",
                      borderBottom: i < favourites.length-1 ? "1px solid #f5f5f5" : "none" }}>
                    <div style={{ width:20, height:20, borderRadius:5, border:"2px solid " + (checked ? "#9ebd6e" : "#e0e0e0"),
                      background: checked ? "#9ebd6e" : "#fff", flexShrink:0,
                      display:"flex", alignItems:"center", justifyContent:"center" }}>
                      {checked && <span style={{ color:"#fff", fontSize:13, lineHeight:1, fontWeight:700 }}>✓</span>}
                    </div>
                    <span style={{ flex:1, fontSize:14, color:"#111111" }}>{fav.text}</span>
                    <span style={{ fontSize:12, color:"#767676", flexShrink:0 }}>{fav.calories ? fav.calories + " kcal" : "—"}</span>
                  </div>
                );
              })}
              {selectedFavs.length > 0 && (
                <div style={{ padding:"10px 14px", borderTop:"1.5px solid #efefef", background:"#f5f5f5" }}>
                  <button onClick={addSelectedFavourites}
                    style={{ width:"100%", padding:"10px", background:"#9ebd6e", color:"#fff", border:"none", borderRadius:8, fontSize:14, fontFamily:"inherit", fontWeight:700, cursor:"pointer" }}>
                    {"+ Add " + selectedFavs.length + " item" + (selectedFavs.length > 1 ? "s" : "") + " to log"}
                  </button>
                </div>
              )}
            </div>
          )}
        </div>
      )}

      <textarea ref={textareaRef} placeholder="What did you eat or drink? Be specific for best accuracy…" value={text} onChange={e=>setText(e.target.value)}
        style={{ width:"100%", minHeight:46, padding:"12px 14px", borderRadius:12, border:"1.5px solid #efefef", background:"#fff", fontFamily:"inherit", fontSize:14, color:"#111111", resize:"none", outline:"none", lineHeight:1.5 }} />
      {error && <div style={{ fontSize:12, color:"#111111", marginTop:6 }}>{error}</div>}

      <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:2 }}>
        <AnalyseBtn onClick={analyse} disabled={!text.trim()||loading}>Analyse</AnalyseBtn>
        {isPending && !pending?._multiSummary && <AnalyseBtn onClick={addItem} color="#6a9e6a">✓ Add to log</AnalyseBtn>}
        {isPending && !pending?._multiSummary && pending?.text && !favourites.find(f=>f.text===pending.text) && (
          <AnalyseBtn onClick={saveAsFavourite} color="#767676"><Icon name="star" size={15} color="#fff"/> Save</AnalyseBtn>
        )}
      </div>
      {loading && <div style={{ marginTop:10 }}><Spinner /></div>}

      {isPending && (
        <div style={{ marginTop:12 }}>
          {!pending?._multiSummary && (
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
            <span style={{ fontSize:12, color:"#767676", fontWeight:600 }}>Time:</span>
            <HourSelect value={pendingTime} onChange={setPendingTime} />
          </div>
          )}
          {pending?._multiSummary && (
            <div style={{ padding:"10px 12px", background:"#f0fdf5", borderRadius:10, border:"1.5px solid #6a9e6a33", marginBottom:10, fontSize:13, color:"#111111" }}>
              <div style={{ fontWeight:700, color:"#111111", marginBottom:4 }}>✓ {pending.calories} kcal logged across multiple entries</div>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:8 }}>
                {[{label:"Protein",value:pending.protein_g,unit:"g",color:"#111111"},{label:"Carbs",value:pending.carbs_g,unit:"g",color:"#111111"},{label:"Fat",value:pending.fat_g,unit:"g",color:"#111111"}].map(s=>(
                  <div key={s.label} style={{ textAlign:"center", padding:"4px 10px", background:"#f9f9f9", borderRadius:8, border:`1.5px solid ${s.color}33` }}>
                    <div style={{ fontSize:15, fontWeight:700, color:s.color }}>{s.value}g</div>
                    <div style={{ fontSize:12, color:"#767676" }}>{s.label}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
          {/* Food macros */}
          {pending && !pending._multiSummary && (
            <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:10 }}>
              {[{label:"Calories",value:pending.calories,unit:"kcal",color:"#111111"},{label:"Protein",value:pending.protein_g,unit:"g",color:"#111111"},{label:"Carbs",value:pending.carbs_g,unit:"g",color:"#111111"},{label:"Fat",value:pending.fat_g,unit:"g",color:"#111111"}].map(s=>(
                <div key={s.label} style={{ flex:"1 1 70px", textAlign:"center", padding:"8px 6px", background:"#f9f9f9", borderRadius:10, border:`1.5px solid ${s.color}33` }}>
                  <div style={{ fontSize:18, fontWeight:700, color:s.color }}>{s.value}</div>
                  <div style={{ fontSize:12, color:"#767676", letterSpacing:0.5 }}>{s.unit} {s.label}</div>
                </div>
              ))}
            </div>
          )}
          )}
          {/* Drink units */}
          {pendingDrink && (
            <div style={{ display:"inline-flex", alignItems:"center", gap:8, padding:"8px 14px", background:"#f5f5f5", borderRadius:10, border:"1.5px solid #9ebd6e33", marginBottom:10 }}>
              <span style={{ display:"flex", alignItems:"center" }}><Icon name="beer" size={20} color="#9ebd6e"/></span>
              <div>
                <div style={{ fontWeight:700, color:"#111111", fontSize:16 }}>{pendingDrink.units} units</div>
                <div style={{ fontSize:12, color:"#767676" }}>{pendingDrink.drink_type}{pendingDrink.abv ? ` · ${pendingDrink.abv}% ABV` : ""}{pendingDrink.volume_ml ? ` · ${pendingDrink.volume_ml}ml` : ""}</div>
              </div>
            </div>
          )}
          <AIBubble text={(pending||pendingDrink)?.commentary} />
          {chatCtx && <ChatWidget systemPrompt={`You are a friendly nutritionist and health coach. Today: ${dayContext}. Answer follow-up questions about this food or drink. British English.`} contextSummary={chatCtx} placeholder="e.g. How many units is that this week? What could I eat instead?" />}
        </div>
      )}

      {/* Unified log */}
      {allItems.length > 0 && (
        <div style={{ marginTop:14, borderTop:"1px solid #efefef", paddingTop:10 }}>
          {/* Older items — hidden in accordion */}
          {allItems.length > 3 && (
            <div style={{ marginBottom:4 }}>
              <button onClick={()=>setShowAllItems(v=>!v)}
                style={{ display:"flex", alignItems:"center", gap:6, width:"100%", background:"none", border:"none", padding:"6px 0", fontFamily:"inherit", cursor:"pointer", color:"#767676", fontSize:12, fontWeight:600 }}>
                <Icon name={showAllItems?"chevup":"chevdown"} size={14} color="#767676"/>
                {showAllItems ? "Hide older items" : `Show ${allItems.length - 3} older item${allItems.length - 3 > 1 ? "s" : ""}`}
              </button>
              {showAllItems && allItems.slice(0, allItems.length - 3).map((item, idx) => renderLogItem(item, idx, "older"))}
            </div>
          )}
          {/* Always show last 3 */}
          {allItems.slice(-3).map((item, idx) => renderLogItem(item, idx, "recent"))}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", paddingTop:10, marginTop:4 }}>
            <span style={{ fontSize:13, color:"#767676" }}>Total</span>
            <div style={{ display:"flex", gap:12, alignItems:"center" }}>
              {totalUnits > 0 && <span style={{ fontSize:13, color:"#111111", fontWeight:600, display:"flex", alignItems:"center", gap:4 }}><Icon name="beer" size={15} color="#9ebd6e"/>{totalUnits.toFixed(1)} units</span>}
              <span style={{ fontSize:18, fontWeight:700, color:"#111111" }}>{totalCals} <span style={{ fontSize:12, fontWeight:400, color:"#767676" }}>kcal</span></span>
            </div>
          </div>
          <button onClick={()=>{ setText(""); setPending(null); setPendingDrink(null); setPreviewSrc(null); }}
            style={{ width:"100%", marginTop:12, padding:"10px", background:"none", border:"1.5px dashed #dddddd", borderRadius:10, color:"#767676", fontSize:13, fontFamily:"inherit", fontWeight:500, cursor:"pointer" }}>
            + Log another item
          </button>
        </div>
      )}
    </Section>
  );
}

// ── Fitbit Section ────────────────────────────────────────────────────────────
function FitbitSection({ fitbitData, onUpdate, connected }) {
  const [syncing, setSyncing] = useState(false);
  const [error, setError] = useState("");

  const sync = async () => {
    setSyncing(true); setError("");
    try {
      const data = await fetchFitbitDay();
      onUpdate(data);
      ls.setStr(FB_FETCH_KEY, today());
    } catch(e) { setError(e.message); }
    setSyncing(false);
  };

  const startAuth = async () => {
    const { verifier, challenge } = await pkce();
    ls.setStr(FB_VERIFIER_KEY, verifier);
    window.location.href = fitbitAuthUrl(challenge);
  };

  if (!connected) {
    return (
      <Section title="FITBIT" accent="#4a86d8">
        <div style={{ fontSize:13.5, color:"#767676", marginBottom:12, lineHeight:1.6 }}>
          Connect Fitbit to automatically pull your steps, sleep, and heart rate each day.
        </div>
        <button onClick={startAuth}
          style={{ padding:"10px 24px", background:"#4a86d8", color:"#fff", border:"none", borderRadius:24, fontSize:14, fontFamily:"inherit", fontWeight:600 }}>
          Connect Fitbit
        </button>
      </Section>
    );
  }

  const f = fitbitData;
  const fetchTime = f?.fetchedAt ? new Date(f.fetchedAt).toLocaleTimeString("en-GB", { hour:"2-digit", minute:"2-digit" }) : null;

  // Arc progress helper
  const Arc = ({ value, max, color, size=90, label, sublabel }) => {
    const pct = Math.min(1, value / max);
    const r = (size - 14) / 2;
    const cx = size / 2, cy = size / 2;
    const startAngle = -210, totalAngle = 240;
    const toRad = deg => (deg * Math.PI) / 180;
    const arcPath = (angle) => {
      const a = toRad(startAngle + angle);
      return `${cx + r * Math.cos(a)},${cy + r * Math.sin(a)}`;
    };
    const trackD = `M ${arcPath(0)} A ${r} ${r} 0 ${totalAngle > 180 ? 1 : 0} 1 ${arcPath(totalAngle)}`;
    const fillAngle = pct * totalAngle;
    const fillD = `M ${arcPath(0)} A ${r} ${r} 0 ${fillAngle > 180 ? 1 : 0} 1 ${arcPath(fillAngle)}`;
    return (
      <div style={{ textAlign:"center" }}>
        <svg width={size} height={size}>
          <path d={trackD} fill="none" stroke="#efefef" strokeWidth="8" strokeLinecap="round"/>
          <path d={fillD} fill="none" stroke={color} strokeWidth="8" strokeLinecap="round"/>
          <text x={cx} y={cy-4} textAnchor="middle" fill="#111111" fontSize={size > 80 ? 15 : 12} fontWeight="700">{label}</text>
          <text x={cx} y={cy+12} textAnchor="middle" fill="#767676" fontSize={12}>{sublabel}</text>
        </svg>
      </div>
    );
  };

  return (
    <Section title="FITBIT" accent="#4a86d8">
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
        <div style={{ fontSize:12, color:"#767676" }}>{fetchTime ? `Synced ${fetchTime}` : "Not synced today"}</div>
        <button onClick={sync} disabled={syncing}

// ── ScrollRight — auto-scrolls a container to the rightmost position ──────────
function ScrollRight({ children, style }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current) ref.current.scrollLeft = ref.current.scrollWidth;
  }, []);
  return <div ref={ref} style={{ overflowX:"auto", ...style }}>{children}</div>;
}

function WeightSection({ entry, allEntries, currentDay, onUpdate, dayContext }) {
  const [weight, setWeight] = useState(entry.weight||"");
  const [banner, setBanner] = useState(null);

  const computeBanner = (w) => {
    const kg = parseFloat(w);
    if (!kg) return null;
    const prev = Object.entries(allEntries)
      .filter(([d, e]) => d < currentDay && e.weight)
      .sort((a, b) => a[0].localeCompare(b[0]));
    const lastEntry = prev[prev.length - 1];
    const lastKg = lastEntry ? parseFloat(lastEntry[1].weight) : null;
    const diff = lastKg !== null ? +(kg - lastKg).toFixed(1) : null;
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
    const cutoffStr = cutoff.toISOString().split("T")[0];
    const weekEntries = prev.filter(([d]) => d >= cutoffStr);
    const weekTrend = weekEntries.length >= 2
      ? +(parseFloat(weekEntries[weekEntries.length-1][1].weight) - parseFloat(weekEntries[0][1].weight)).toFixed(1)
      : null;

    const msgs = [];
    let tone = "neutral";

    if (diff !== null) {
      if (diff <= -0.3) {
        msgs.push(`⬇ Down ${Math.abs(diff)}kg since ${formatDate(lastEntry[0])} — great work!`);
        tone = "good";
      } else if (diff >= 0.3) {
        msgs.push(`⬆ Up ${diff}kg since ${formatDate(lastEntry[0])}.`);
        tone = "bad";
      } else {
        const changeStr = Math.abs(diff) < 0.05 ? "no change" : (diff < 0 ? "down " + Math.abs(diff) + "kg" : "up " + diff + "kg");
        msgs.push(`Weight saved — ${changeStr} from last entry.`);
      }
    } else {
      msgs.push("Weight saved.");
    }

    if (weekTrend !== null && Math.abs(weekTrend) >= 0.8) {
      if (weekTrend > 0) {
        msgs.push(`Trend: up ${weekTrend}kg over the past week — worth keeping an eye on.`);
        if (tone === "neutral") tone = "bad";
      } else {
        msgs.push(`Trend: down ${Math.abs(weekTrend)}kg over the past week — great progress!`);
        if (tone === "neutral") tone = "good";
      }
    }
    return { msg: msgs.join(" "), tone };
  };

  const save = () => {
    if (!weight) return;
    onUpdate({ weight });
    setBanner(computeBanner(weight));
  };

  const bc = { good:{ bg:"#edfaf2", border:"#6a9e6a", text:"#3a7a40" }, bad:{ bg:"#fff5f7", border:"#e8457a", text:"#801030" }, neutral:{ bg:"#f5f5f5", border:"#dddddd", text:"#767676" } };

  return (
    <Section title="WEIGHT" accent="#767676">
      <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
        <input type="number" step="0.1" placeholder="0.0" value={weight}
          onChange={e=>setWeight(e.target.value)}
          style={{ width:120, padding:"12px 14px", borderRadius:12, border:"1.5px solid #efefef", background:"#fff", fontFamily:"inherit", fontSize:24, fontWeight:700, color:"#111111", outline:"none", textAlign:"center" }} />
        <span style={{ color:"#767676", fontSize:16, fontWeight:500 }}>kg</span>
      </div>
      <div style={{ marginTop:10 }}>
        <button onClick={save} disabled={!weight}
          style={{ padding:"10px 24px", background:!weight?"#e0e0e0":"#767676", color:!weight?"#aaaaaa":"#fff", border:"none", borderRadius:24, fontSize:14, fontFamily:"inherit", fontWeight:600, cursor:"pointer" }}>
          Save
        </button>
      </div>
      {banner && (()=>{ const c=bc[banner.tone]; return (
        <div style={{ marginTop:10, padding:"10px 14px", background:c.bg, border:`1.5px solid ${c.border}`, borderRadius:10, fontSize:13, color:c.text, lineHeight:1.6 }}>
          {banner.msg}
        </div>
      ); })()}
      <div style={{ marginTop:8, fontSize:12, color:"#767676" }}>Detailed trend analysis in Insights → Weight Trend</div>
    </Section>
  );
}

// ── Blood Pressure Section ────────────────────────────────────────────────────
function bpCategory(s, d) {
  if (!s || !d) return null;
  const sv = Number(s), dv = Number(d);
  if (sv > 180 || dv > 120) return { label:"Hypertensive Crisis", short:"Crisis",    bg:"#fce8e8", border:"#b02020", text:"#700020", dot:"#b02020" };
  if (sv >= 140 || dv >= 90) return { label:"High — Stage 2",     short:"Stage 2",   bg:"#fff5f7", border:"#e8457a", text:"#801030", dot:"#e8457a" };
  if (sv >= 130 || dv >= 80) return { label:"High — Stage 1",     short:"Stage 1",   bg:"#fff8f0", border:"#9ebd6e", text:"#7a4010", dot:"#9ebd6e" };
  if (sv >= 120 && dv < 80)  return { label:"Elevated",           short:"Elevated",  bg:"#fffbe0", border:"#c8a000", text:"#5a5000", dot:"#c8a000" };
  return                             { label:"Normal",             short:"Normal",    bg:"#edfaf2", border:"#6a9e6a", text:"#3a7a40", dot:"#6a9e6a" };
}

// ── Reorderable Layout ────────────────────────────────────────────────────────
function DraggableLayout({ storageKey, defaultOrder, editMode, renderSection }) {
  const [order, setOrder] = useState(() => {
    const saved = ls.get(storageKey);
    if (saved && Array.isArray(saved) && saved.length === defaultOrder.length &&
        defaultOrder.every(id => saved.includes(id))) return saved;
    return defaultOrder;
  });

  const move = (idx, dir) => {
    const newOrder = [...order];
    const target = idx + dir;
    if (target < 0 || target >= newOrder.length) return;
    [newOrder[idx], newOrder[target]] = [newOrder[target], newOrder[idx]];
    setOrder(newOrder);
    ls.set(storageKey, newOrder);
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
      {order.map((id, idx) => {
        const content = renderSection(id);
        if (!content) return null;
        return (
          <div key={id} style={{ position:"relative" }}>
            {editMode && (
              <div style={{ position:"absolute", top:10, right:10, zIndex:20, display:"flex", flexDirection:"row", gap:6 }}>
                {[[-1, false], [1, true]].map(([dir, flip]) => {
                  const disabled = dir === -1 ? idx === 0 : idx === order.length - 1;
                  const col = disabled ? "#dddddd" : "#3a76d8";
                  return (
                    <button key={dir} onClick={()=>move(idx, dir)} disabled={disabled}
                      style={{
                        width:34, height:34, borderRadius:"50%",
                        background: disabled ? "#f5f5f5" : "#fff",
                        border: `2.5px solid ${col}`,
                        cursor: disabled ? "default" : "pointer",
                        display:"flex", alignItems:"center", justifyContent:"center",
                        boxShadow: disabled ? "none" : "0 2px 8px #3a76d833",
                        transition:"all 0.15s", padding:0
                      }}>
                      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"
                        style={{ transform: flip ? "rotate(180deg)" : "none" }}>
                        <polyline points="2,10 7,4 12,10" stroke={col} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                      </svg>
                    </button>
                  );
                })}
              </div>
            )}
            {content}
          </div>
        );
      })}
    </div>
  );
}
