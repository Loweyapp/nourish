const { useState, useEffect, useRef } = React;

// ── Constants ─────────────────────────────────────────────────────────────────
const STORAGE_KEY      = "nourish-entries-v1";
const API_KEY_STORAGE  = "nourish-api-key";
const FB_TOKEN_KEY     = "nourish-fitbit-token";
const FB_VERIFIER_KEY  = "nourish-fitbit-verifier";
const FB_FETCH_KEY     = "nourish-fitbit-fetched";
const FITBIT_CLIENT_ID = "23TXZL";
const REDIRECT_URI     = "https://loweyapp.github.io/nourish";
const FITBIT_SCOPES    = "activity sleep heartrate";

const MOODS = [
  { emoji: "😴", label: "Exhausted", value: 1 },
  { emoji: "😔", label: "Low",       value: 2 },
  { emoji: "😐", label: "Okay",      value: 3 },
  { emoji: "🙂", label: "Good",      value: 4 },
  { emoji: "⚡", label: "Energised", value: 5 },
];
const ENERGY = [
  { emoji: "🪫",  label: "Drained", value: 1 },
  { emoji: "😮‍💨", label: "Tired",   value: 2 },
  { emoji: "😌",  label: "Steady",  value: 3 },
  { emoji: "💪",  label: "Strong",  value: 4 },

// ── Helpers ───────────────────────────────────────────────────────────────────
function today() { return new Date().toISOString().split("T")[0]; }
function yesterday() {
  const d = new Date(); d.setDate(d.getDate() - 1);
  return d.toISOString().split("T")[0];
}
function formatDate(d) {
  return new Date(d + "T12:00:00").toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" });
}
function fmtMins(m) {
  if (!m) return "0h 0m";
  return `${Math.floor(m/60)}h ${m%60}m`;
}

// ── LocalStorage ──────────────────────────────────────────────────────────────
const ls = {
  get: (k, fallback = null) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : fallback; } catch { return fallback; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
  del: (k) => { try { localStorage.removeItem(k); } catch {} },
  str: (k) => localStorage.getItem(k) || "",
  setStr: (k, v) => localStorage.setItem(k, v),
};

function loadEntries()   { return ls.get(STORAGE_KEY, {}); }
function saveEntries(e)  { ls.set(STORAGE_KEY, e); }
function getApiKey()     { return ls.str(API_KEY_STORAGE); }
function saveApiKey(k)   { ls.setStr(API_KEY_STORAGE, k); }
function getFitbitToken(){ return ls.get(FB_TOKEN_KEY); }
function saveFitbitToken(t) { ls.set(FB_TOKEN_KEY, t); }
function clearFitbitToken() { ls.del(FB_TOKEN_KEY); ls.del(FB_FETCH_KEY); }

// ── Claude ────────────────────────────────────────────────────────────────────
async function askClaude(messages, systemPrompt) {
  const key = getApiKey();
  if (!key) throw new Error("No API key");
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
    body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: systemPrompt, messages }),
  });
  const raw = await res.text();
  let data; try { data = JSON.parse(raw); } catch { throw new Error(`Bad response: ${raw.slice(0,100)}`); }
  if (!res.ok || data.error) throw new Error(data.error?.message || `HTTP ${res.status}`);
  return data.content?.[0]?.text || "";
}

// ── Fitbit OAuth (PKCE) ───────────────────────────────────────────────────────
function b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");
}
async function pkce() {
  const verifier = b64url(crypto.getRandomValues(new Uint8Array(32)));
  const challenge = b64url(await crypto.subtle.digest("SHA-256", new TextEncoder().encode(verifier)));
  return { verifier, challenge };
}
function fitbitAuthUrl(challenge) {
  const p = new URLSearchParams({
    response_type: "code", client_id: FITBIT_CLIENT_ID,
    redirect_uri: REDIRECT_URI, scope: FITBIT_SCOPES,
    code_challenge: challenge, code_challenge_method: "S256",
    expires_in: "604800"
  });
  return "https://www.fitbit.com/oauth2/authorize?" + p;
}
async function exchangeCode(code, verifier) {
  const res = await fetch("https://api.fitbit.com/oauth2/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({ client_id: FITBIT_CLIENT_ID, grant_type: "authorization_code", redirect_uri: REDIRECT_URI, code, code_verifier: verifier })
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.errors?.[0]?.message || "Token exchange failed");
  return data;
}
async function refreshFitbitToken() {
  const stored = getFitbitToken();
  if (!stored?.refresh_token) return null;
  const res = await fetch("https://api.fitbit.com/oauth2/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: new URLSearchParams({ client_id: FITBIT_CLIENT_ID, grant_type: "refresh_token", refresh_token: stored.refresh_token })
  });
  const data = await res.json();
  if (!res.ok) { clearFitbitToken(); return null; }
  const token = { ...data, expires_at: Date.now() + data.expires_in * 1000 };
  saveFitbitToken(token);
  return token.access_token;
}
async function getFitbitAccessToken() {
  const stored = getFitbitToken();
  if (!stored) return null;
  if (stored.expires_at && Date.now() < stored.expires_at - 60000) return stored.access_token;
  return await refreshFitbitToken();
}
const FITBIT_PROXY = "https://rapid-star-52f2.alexlowe1.workers.dev/fitbit";

async function fitbitGet(path) {
  const token = await getFitbitAccessToken();
  if (!token) throw new Error("No Fitbit token — please reconnect");
  let res;
  try {
    res = await fetch(FITBIT_PROXY + path, { headers: { Authorization: "Bearer " + token } });
  } catch(netErr) {
    throw new Error("Network error: " + (netErr.message || String(netErr)));
  }
  if (res.status === 401) { clearFitbitToken(); throw new Error("Fitbit token expired — please reconnect"); }
  let data; try { data = await res.json(); } catch { throw new Error("Bad response from proxy (HTTP " + res.status + ")"); }
  if (!res.ok) throw new Error(data.errors?.[0]?.message || "Fitbit error " + res.status);
  return data;
}

// Fetch today's Fitbit data
async function fetchFitbitDay() {
  const actSum    = await fitbitGet("/1/user/-/activities/date/" + today() + ".json");
  const sleepData = await fitbitGet("/1.2/user/-/sleep/date/" + today() + ".json");
  const hrData    = await fitbitGet("/1/user/-/activities/heart/date/" + today() + "/1d.json");

  const steps        = actSum.summary?.steps ?? 0;
  const activeMin    = actSum.summary?.fairlyActiveMinutes + actSum.summary?.veryActiveMinutes ?? 0;
  const calsBurned   = actSum.summary?.caloriesOut ?? 0;
  const restingHR    = hrData["activities-heart"]?.[0]?.value?.restingHeartRate ?? null;

  // Sleep: Fitbit returns sleep that ended on the date (i.e. last night)
  const mainSleep    = sleepData.sleep?.find(s => s.isMainSleep) || sleepData.sleep?.[0];
  const sleepMins    = mainSleep?.minutesAsleep ?? 0;
  const deepMins     = mainSleep?.levels?.summary?.deep?.minutes ?? 0;
  const remMins      = mainSleep?.levels?.summary?.rem?.minutes ?? 0;
  const lightMins    = mainSleep?.levels?.summary?.light?.minutes ?? 0;
  const awakeMins    = mainSleep?.levels?.summary?.wake?.minutes ?? 0;
  const sleepStart   = mainSleep?.startTime ?? null;
  const sleepEnd     = mainSleep?.endTime ?? null;

  return { steps, activeMin, calsBurned, restingHR, sleepMins, deepMins, remMins, lightMins, awakeMins, sleepStart, sleepEnd, fetchedAt: Date.now() };
}

// ── Day context ───────────────────────────────────────────────────────────────
function buildDayContext(entry) {
  if (!entry) return "No data logged today yet.";
  const parts = [];
  if (entry.food?.length) {
    const totalCals = entry.food.reduce((s, f) => s + (f.calories || 0), 0);
    parts.push(`Food: ${entry.food.map(f => `${f.meal}: ${f.text} (${f.calories} kcal)`).join("; ")}. Total: ${totalCals} kcal.`);
  }
  if (entry.mood)     parts.push(`Mood: ${MOODS.find(m => m.value === entry.mood)?.label}.`);
  if (entry.energy)   parts.push(`Energy: ${ENERGY.find(e => e.value === entry.energy)?.label}.`);
  if (entry.moodNote) parts.push(`Wellbeing notes: "${entry.moodNote}".`);
  if (entry.exercise) parts.push(`Exercise: ${entry.exercise}.`);
  if (entry.weight)   parts.push(`Weight: ${entry.weight}kg.`);
  if (entry.fitbit) {
    const f = entry.fitbit;
    if (f.steps)     parts.push(`Steps: ${f.steps.toLocaleString()}.`);
    if (f.sleepMins) parts.push(`Sleep last night: ${fmtMins(f.sleepMins)} (deep ${fmtMins(f.deepMins)}, REM ${fmtMins(f.remMins)}, light ${fmtMins(f.lightMins)}).`);
    if (f.restingHR) parts.push(`Resting heart rate: ${f.restingHR} bpm.`);
    if (f.activeMin) parts.push(`Active minutes: ${f.activeMin}.`);
    if (f.calsBurned)parts.push(`Calories burned (total): ${f.calsBurned}.`);
  }
  return parts.length ? parts.join(" ") : "No data logged today yet.";
}

}
function ChatWidget({ systemPrompt, contextSummary, placeholder="Ask a follow-up…" }) {
  const [history, setHistory] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const bottomRef = useRef(null);
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:"smooth" }); }, [history, loading]);
  const send = async () => {
    if (!input.trim() || loading) return;
    const userMsg = { role:"user", content:input.trim() };
    setInput(""); setLoading(true); setError("");
    const msgs = contextSummary
      ? [{ role:"user", content:"Please acknowledge the context." }, { role:"assistant", content:contextSummary }, ...history, userMsg]
      : [...history, userMsg];
    try { const reply = await askClaude(msgs, systemPrompt); setHistory(p => [...p, userMsg, { role:"assistant", content:reply }]); }
    catch(e) { setError(e.message); }
    setLoading(false);
  };
  return (
    <div style={{ marginTop:12, borderTop:"1px solid #ecdfc8", paddingTop:12 }}>
      <div style={{ fontSize:11, fontWeight:700, color:"#a07850", letterSpacing:1, marginBottom:8 }}>💬 ASK A FOLLOW-UP</div>
      {history.length > 0 && (
        <div style={{ maxHeight:260, overflowY:"auto", marginBottom:10, display:"flex", flexDirection:"column", gap:8 }}>
          {history.map((m,i) => (
            <div key={i} style={{ alignSelf:m.role==="user"?"flex-end":"flex-start", maxWidth:"85%", padding:"8px 12px", borderRadius:m.role==="user"?"14px 14px 4px 14px":"14px 14px 14px 4px", background:m.role==="user"?"#c8955a":"#f5e9d6", color:m.role==="user"?"#fff":"#5a3e28", fontSize:13.5, lineHeight:1.55, whiteSpace:"pre-wrap" }}>{m.content}</div>
          ))}
          {loading && <div style={{ alignSelf:"flex-start", padding:"8px 12px", background:"#f5e9d6", borderRadius:"14px 14px 14px 4px" }}><Spinner small /></div>}
          <div ref={bottomRef} />
        </div>
      )}
      {error && <div style={{ fontSize:12, color:"#c87a6a", marginBottom:6 }}>{error}</div>}
      <div style={{ display:"flex", gap:8 }}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} }} placeholder={placeholder}
          style={{ flex:1, padding:"10px 13px", borderRadius:10, border:"1.5px solid #e0ccb4", background:"#fff", fontFamily:"inherit", fontSize:14, color:"#3d2b1a", outline:"none" }} />
        <button onClick={send} disabled={!input.trim()||loading}
          style={{ padding:"10px 16px", background:"#c8955a", color:"#fff", border:"none", borderRadius:10, fontSize:18, fontFamily:"inherit", fontWeight:700 }}>↑</button>
      </div>
    </div>
  );
}

function AnalyseBtn({ onClick, disabled, color="#c8955a", children }) {

function HourSelect({ value, onChange }) {
  return (
    <select value={value} onChange={e=>onChange(e.target.value)}
      style={{ fontSize:12, color:"#a07850", background:"none", border:"none", borderBottom:"1px dashed #d0b898", padding:"2px 4px", fontFamily:"inherit", cursor:"pointer", outline:"none" }}>
      {Array.from({length:19},(_,i)=>i+6).map(h => {

function StatPill({ label, value, unit, color }) {

// ── Food Section ──────────────────────────────────────────────────────────────
function FoodSection({ foodItems, onUpdate, dayContext }) {
  const [text, setText] = useState("");
  const [meal, setMeal] = useState("Lunch");
  const [loading, setLoading] = useState(false);
  const [imageLoading, setImageLoading] = useState(false);
  const [pending, setPending] = useState(null);
  const [pendingTime, setPendingTime] = useState("");
  const [previewSrc, setPreviewSrc] = useState(null);
  const [error, setError] = useState("");

  const resizeImage = (file) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("Failed to read file"));
    reader.onload = (e) => {
      const img = new Image();
      img.onerror = () => reject(new Error("Failed to decode image"));
      img.onload = () => {
        const MAX = 1024;
        let { width: w, height: h } = img;
        if (w > MAX || h > MAX) { if (w > h) { h = Math.round(h*MAX/w); w=MAX; } else { w=Math.round(w*MAX/h); h=MAX; } }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
        resolve({ b64: dataUrl.split(",")[1], mediaType:"image/jpeg" });
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });

  const handleImage = async (file) => {
    if (!file) return;
    setImageLoading(true); setPending(null); setText(""); setError("");
    const previewReader = new FileReader();
    previewReader.onload = e => setPreviewSrc(e.target.result);
    previewReader.readAsDataURL(file);
    try {
      const { b64, mediaType } = await resizeImage(file);
      const key = getApiKey();
      const resp = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{ "Content-Type":"application/json", "x-api-key":key, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true" },
        body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:400, messages:[{ role:"user", content:[
          { type:"image", source:{ type:"base64", media_type:mediaType, data:b64 } },
          { type:"text", text:"Describe what food or drink you can see in this image. Include estimated portions or serving sizes where possible (e.g. '2 scrambled eggs on 1 slice of white toast', or if it's packaging read the serving size from the label). Be concise and specific — just the food description, no other commentary." }
        ]}]})
      });
      const raw = await resp.text();
      let data; try { data = JSON.parse(raw); } catch { throw new Error(`Bad response: ${raw.slice(0,100)}`); }
      if (!resp.ok || data.error) throw new Error(data.error?.message || `HTTP ${resp.status}`);
      setText(data.content?.[0]?.text || "");
    } catch(e) { setError("Couldn't identify food: " + (e?.message || String(e))); }
    setImageLoading(false);
  };

  const analyse = async () => {
    if (!text.trim()) return;
    setLoading(true); setPending(null); setError("");
    const nowHour = new Date().getHours();
    setPendingTime(`${String(nowHour).padStart(2,"0")}:00`);
    try {
      const resp = await askClaude(
        [{ role:"user", content:`I ate: "${text}" for ${meal}` }],
        `You are a nutritionist. The user's full day so far: ${dayContext}
Return ONLY valid JSON, no markdown:
{"calories":<number>,"protein_g":<number>,"carbs_g":<number>,"fat_g":<number>,"commentary":"<2-3 sentence friendly assessment: nutritional quality, balance, and if relevant how this fits with their mood/energy/Fitbit data/other meals today>"}
Be realistic with calorie estimates. British English.`
      );
      const parsed = JSON.parse(resp.replace(/```json|```/g,"").trim());
      setPending({ ...parsed, meal, text });
    } catch(e) { setError(e.message || "Couldn't analyse — try being more specific about portions."); }
    setLoading(false);
  };

  const addItem = () => {
    if (!pending || pending.error) return;
    onUpdate([...foodItems, { ...pending, time:pendingTime }]);
    setText(""); setPending(null); setPendingTime(""); setPreviewSrc(null);
  };
  const remove = (i) => onUpdate(foodItems.filter((_,idx)=>idx!==i));
  const updateTime = (i, t) => onUpdate(foodItems.map((f,idx)=>idx===i?{...f,time:t}:f));
  const totalCals = foodItems.reduce((s,f)=>s+(f.calories||0),0);
  const chatCtx = pending && !pending.error
    ? `Meal: "${pending.text}" (${pending.meal}). ${pending.calories} kcal, ${pending.protein_g}g protein, ${pending.carbs_g}g carbs, ${pending.fat_g}g fat. Assessment: ${pending.commentary}` : null;

  return (
    <Section title="🍽 Food" accent="#c8955a">
      <div style={{ display:"flex", gap:8, marginBottom:12, flexWrap:"wrap" }}>
        {["Breakfast","Lunch","Dinner","Snack"].map(m=><Pill key={m} selected={meal===m} onClick={()=>setMeal(m)}>{m}</Pill>)}
      </div>
      <input id="nourish-camera" type="file" accept="image/*" capture="environment" style={{ display:"none" }}
        onChange={e=>{ handleImage(e.target.files?.[0]); e.target.value=""; }} />
      <input id="nourish-gallery" type="file" accept="image/*" style={{ display:"none" }}
        onChange={e=>{ handleImage(e.target.files?.[0]); e.target.value=""; }} />
      <div style={{ display:"flex", gap:8, marginBottom:12 }}>
        <label htmlFor="nourish-camera" style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", gap:6, padding:"10px 8px", borderRadius:10, border:"1.5px solid #e0ccb4", background:"#faf6f0", color:"#8a6840", fontSize:14, fontFamily:"inherit", userSelect:"none" }}>📷 Camera</label>
        <label htmlFor="nourish-gallery" style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"center", gap:6, padding:"10px 8px", borderRadius:10, border:"1.5px solid #e0ccb4", background:"#faf6f0", color:"#8a6840", fontSize:14, fontFamily:"inherit", userSelect:"none" }}>🖼 Gallery</label>
      </div>
      {imageLoading && <div style={{ marginBottom:10 }}><Spinner label="Identifying food…" /></div>}
      {previewSrc && !imageLoading && (
        <div style={{ marginBottom:10, display:"flex", gap:10, alignItems:"flex-start" }}>
          <img src={previewSrc} alt="food" style={{ width:72, height:72, objectFit:"cover", borderRadius:10, border:"1.5px solid #ecdfc8", flexShrink:0 }} />
          <div style={{ fontSize:12, color:"#a07850", lineHeight:1.5, paddingTop:2 }}>Photo identified — description filled in below. Edit if needed, then tap Analyse.</div>
        </div>
      )}
      <textarea placeholder="e.g. bowl of porridge with banana and honey, cup of tea with milk…" value={text} onChange={e=>setText(e.target.value)}
        style={{ width:"100%", minHeight:72, padding:"10px 12px", borderRadius:10, border:"1.5px solid #e0ccb4", background:"#fff", fontFamily:"inherit", fontSize:14, color:"#3d2b1a", resize:"vertical", outline:"none" }} />
      {error && <div style={{ fontSize:12, color:"#c87a6a", marginTop:6 }}>{error}</div>}
      <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
        <AnalyseBtn onClick={analyse} disabled={!text.trim()||loading}>Analyse</AnalyseBtn>
        {pending && !pending.error && <AnalyseBtn onClick={addItem} color="#6a9e6a">✓ Add to log</AnalyseBtn>}
      </div>
      {loading && <div style={{ marginTop:10 }}><Spinner /></div>}
      {pending && !pending.error && (
        <div style={{ marginTop:12 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
            <span style={{ fontSize:12, color:"#a07850", fontWeight:600 }}>Time eaten:</span>
            <HourSelect value={pendingTime} onChange={setPendingTime} />
          </div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginBottom:10 }}>
            {[{label:"Calories",value:pending.calories,unit:"kcal",color:"#c8955a"},{label:"Protein",value:pending.protein_g,unit:"g",color:"#6a9e6a"},{label:"Carbs",value:pending.carbs_g,unit:"g",color:"#7a9ec8"},{label:"Fat",value:pending.fat_g,unit:"g",color:"#c87a6a"}].map(s=>(
              <div key={s.label} style={{ flex:"1 1 70px", textAlign:"center", padding:"8px 6px", background:"#faf6f0", borderRadius:10, border:`1.5px solid ${s.color}33` }}>
                <div style={{ fontSize:18, fontWeight:700, color:s.color }}>{s.value}</div>
                <div style={{ fontSize:10, color:"#8a6840", letterSpacing:0.5 }}>{s.unit} {s.label}</div>
              </div>

          <ChatWidget systemPrompt={`You are a friendly nutritionist with full awareness of the user's day. Today: ${dayContext}. Answer follow-up questions about nutrition, this meal, or how food relates to mood/energy/Fitbit data. British English.`} contextSummary={chatCtx} placeholder="e.g. Is this too many carbs? What could I swap out?" />
        </div>
      )}
      {foodItems.length > 0 && (
        <div style={{ marginTop:14, borderTop:"1px solid #ecdfc8", paddingTop:10 }}>
          {foodItems.map((f,i)=>(
            <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 4px", borderBottom:"1px solid #f5ece0", fontSize:13 }}>
              <div style={{ flex:1, minWidth:0 }}>

          <div style={{ textAlign:"right", paddingTop:8, fontWeight:700, color:"#c8955a", fontSize:15 }}>Total: {totalCals} kcal</div>

  );
}

// ── Fitbit Section ────────────────────────────────────────────────────────────
function FitbitSection({ fitbitData, onUpdate, connected }) {
  const [syncing, setSyncing] = useState(false);
  const [error, setError] = useState("");

  const sync = async () => {
    setSyncing(true); setError("");
    try {
      const data = await fetchFitbitDay();
      onUpdate(data);
      ls.setStr(FB_FETCH_KEY, today());
    } catch(e) { setError(e.message); }
    setSyncing(false);
  };

  const startAuth = async () => {
    const { verifier, challenge } = await pkce();
    ls.setStr(FB_VERIFIER_KEY, verifier);
    window.location.href = fitbitAuthUrl(challenge);
  };

  if (!connected) {
    return (
      <Section title="📱 Fitbit" accent="#6a7ec8">
        <div style={{ fontSize:13.5, color:"#8a6840", marginBottom:12, lineHeight:1.6 }}>
          Connect Fitbit to automatically pull your steps, sleep, and heart rate each day.
        </div>
        <button onClick={startAuth}
          style={{ padding:"10px 20px", background:"linear-gradient(135deg,#6a7ec8,#4a5ea8)", color:"#fff", border:"none", borderRadius:12, fontSize:14, fontFamily:"inherit", fontWeight:700 }}>
          Connect Fitbit
        </button>
      </Section>
    );
  }

  const f = fitbitData;
  const fetchTime = f?.fetchedAt ? new Date(f.fetchedAt).toLocaleTimeString("en-GB", { hour:"2-digit", minute:"2-digit" }) : null;

  return (
    <Section title="📱 Fitbit" accent="#6a7ec8">
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
        <div style={{ fontSize:11, color:"#a07850" }}>{fetchTime ? `Last synced ${fetchTime}` : "Not synced today"}</div>
        <button onClick={sync} disabled={syncing}
          style={{ padding:"6px 14px", background:"#6a7ec8", color:"#fff", border:"none", borderRadius:8, fontSize:12, fontFamily:"inherit", fontWeight:600 }}>
          {syncing ? "Syncing…" : "↻ Sync now"}
        </button>
      </div>
      {error && <div style={{ fontSize:12, color:"#c87a6a", marginBottom:8 }}>{error}</div>}
      {syncing && <div style={{ marginBottom:10 }}><Spinner label="Fetching Fitbit data…" /></div>}
      {f && (
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          {/* Steps */}
          <div>
            <div style={{ display:"flex", justifyContent:"space-between", fontSize:13, marginBottom:4 }}>
              <span style={{ fontWeight:600, color:"#3d2b1a" }}>👟 Steps</span>
              <span style={{ fontWeight:700, color:"#6a7ec8" }}>{(f.steps||0).toLocaleString()} <span style={{ fontWeight:400, fontSize:11, color:"#a07850" }}>/ 10,000</span></span>
            </div>
            <ProgressBar value={f.steps||0} max={10000} color="#6a7ec8" />
          </div>
          {/* Sleep */}
          {f.sleepMins > 0 && (
            <div>
              <div style={{ fontWeight:600, color:"#3d2b1a", fontSize:13, marginBottom:8 }}>🌙 Sleep last night</div>
              <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                <StatPill label="Total" value={fmtMins(f.sleepMins)} unit="" color="#7a6ec8" />
                <StatPill label="Deep" value={fmtMins(f.deepMins)} unit="" color="#4a5ea8" />
                <StatPill label="REM" value={fmtMins(f.remMins)} unit="" color="#8a7ec8" />
                <StatPill label="Light" value={fmtMins(f.lightMins)} unit="" color="#aaa0d8" />
              </div>
            </div>
          )}
          {/* HR + Activity */}
          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            {f.restingHR && <StatPill label="Resting HR" value={f.restingHR} unit="bpm" color="#c87a6a" />}
            {f.activeMin > 0 && <StatPill label="Active mins" value={f.activeMin} unit="min" color="#6a9e6a" />}
            {f.calsBurned > 0 && <StatPill label="Cals burned" value={f.calsBurned} unit="kcal" color="#c8955a" />}
          </div>
        </div>
      )}
      {!f && !syncing && (
        <div style={{ fontSize:13, color:"#a07850" }}>Tap "Sync now" to pull today's data from Fitbit.</div>
      )}
    </Section>
  );
}

// ── Mood Section ──────────────────────────────────────────────────────────────
function MoodSection({ entry, onUpdate, dayContext }) {
  const [mood, setMood] = useState(entry.mood||null);
  const [energy, setEnergy] = useState(entry.energy||null);
  const [note, setNote] = useState(entry.moodNote||"");
  const [feedback, setFeedback] = useState(entry.moodFeedback||"");
  const [loading, setLoading] = useState(false);
  const [analysed, setAnalysed] = useState(!!entry.moodFeedback);
  const [error, setError] = useState("");
  const save = (patch) => onUpdate({ mood, energy, moodNote:note, moodFeedback:feedback, ...patch });
  const analyse = async () => {
    if (!mood && !energy) return;
    setLoading(true); setError("");
    const ml = MOODS.find(m=>m.value===mood)?.label||"not set";
    const el = ENERGY.find(e=>e.value===energy)?.label||"not set";
    try {
      const resp = await askClaude(
        [{ role:"user", content:`Mood: ${ml}. Energy: ${el}. Notes: "${note||"none"}"` }],
        `You are a wellness coach with full awareness of the user's day. Today: ${dayContext}
Give 2-3 sentences: acknowledge how they're feeling and — where relevant — connect it to what they've eaten, their Fitbit sleep/steps data, or their exercise. Offer a practical observation. British English. Warm tone.`
      );
      setFeedback(resp); setAnalysed(true); save({ moodFeedback:resp });
    } catch(e) { setError(e.message); }
    setLoading(false);
  };
  const chatCtx = analysed ? `Mood: ${MOODS.find(m=>m.value===mood)?.label}, Energy: ${ENERGY.find(e=>e.value===energy)?.label}. Notes: "${note}". Feedback: ${feedback}` : null;
  return (
    <Section title="💭 How are you feeling?" accent="#7a9ec8">
      <Label>Mood</Label>
      <EmojiPicker options={MOODS} value={mood} onChange={v=>{ setMood(v); save({ mood:v }); }} />
      <div style={{ marginTop:14 }}>
        <Label>Energy level</Label>
        <EmojiPicker options={ENERGY} value={energy} onChange={v=>{ setEnergy(v); save({ energy:v }); }} />
      </div>
      <textarea placeholder="Any notes? Headache, brain fog, stressed, anxious, feeling great…" value={note}
        onChange={e=>setNote(e.target.value)} onBlur={()=>save({ moodNote:note })}
        style={{ marginTop:12, width:"100%", minHeight:60, padding:"10px 12px", borderRadius:10, border:"1.5px solid #e0ccb4", background:"#fff", fontFamily:"inherit", fontSize:14, color:"#3d2b1a", resize:"vertical", outline:"none" }} />
      {error && <div style={{ fontSize:12, color:"#c87a6a", marginTop:6 }}>{error}</div>}
      <AnalyseBtn onClick={analyse} disabled={(!mood&&!energy)||loading} color="#7a9ec8">Get feedback</AnalyseBtn>
      {loading && <div style={{ marginTop:10 }}><Spinner /></div>}
      {feedback && <AIBubble text={feedback} />}
      {analysed && <ChatWidget systemPrompt={`You are a supportive wellness coach. Today: ${dayContext}. Answer questions about wellbeing, connecting to food, sleep, steps, or exercise data where relevant. Warm, practical, concise. British English.`} contextSummary={chatCtx} placeholder="e.g. Why might I feel this way? Could it be my sleep?" />}
    </Section>
  );
}

// ── Weight Section ────────────────────────────────────────────────────────────
function WeightSection({ entry, allEntries, currentDay, onUpdate, dayContext }) {
  const [weight, setWeight] = useState(entry.weight||"");
  const [feedback, setFeedback] = useState(entry.weightFeedback||"");
  const [loading, setLoading] = useState(false);
  const [analysed, setAnalysed] = useState(!!entry.weightFeedback);
  const [error, setError] = useState("");
  const save = (patch) => onUpdate({ weight, weightFeedback:feedback, ...patch });
  const analyse = async () => {
    if (!weight) return;
    setLoading(true); setError("");
    const history = Object.entries(allEntries).filter(([d,e])=>d<=currentDay&&e.weight).sort((a,b)=>a[0].localeCompare(b[0])).slice(-7).map(([d,e])=>`${formatDate(d)}: ${e.weight}kg`);
    try {
      const resp = await askClaude(
        [{ role:"user", content:`Today's weight: ${weight}kg. Recent history: ${history.join(", ")||"none"}` }],
        `You are a health coach. Today: ${dayContext}
Give 2-3 sentences: acknowledge today's weight, note any trend, connect to food/exercise/Fitbit where relevant. Never be negative about weight. British English.`
      );
      setFeedback(resp); setAnalysed(true); save({ weightFeedback:resp });
    } catch(e) { setError(e.message); }
    setLoading(false);
  };
  const chatCtx = analysed ? `Weight: ${weight}kg. Feedback: ${feedback}` : null;
  return (
    <Section title="⚖️ Weight" accent="#a07850">
      <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
        <input type="number" step="0.1" placeholder="e.g. 74.5" value={weight}
          onChange={e=>setWeight(e.target.value)} onBlur={()=>save({ weight })}
          style={{ width:110, padding:"10px 12px", borderRadius:10, border:"1.5px solid #e0ccb4", background:"#fff", fontFamily:"inherit", fontSize:16, color:"#3d2b1a", outline:"none" }} />
        <span style={{ color:"#8a6840", fontSize:14 }}>kg</span>
        <AnalyseBtn onClick={analyse} disabled={!weight||loading} color="#a07850">Get feedback</AnalyseBtn>
      </div>
      {error && <div style={{ fontSize:12, color:"#c87a6a", marginTop:6 }}>{error}</div>}
      {loading && <div style={{ marginTop:10 }}><Spinner /></div>}
      {feedback && <AIBubble text={feedback} />}
      {analysed && <ChatWidget systemPrompt={`You are a supportive health coach. Today: ${dayContext}. Answer questions about weight, trends, and connect to food/exercise/Fitbit. Non-judgmental, practical. British English.`} contextSummary={chatCtx} placeholder="e.g. Is my trend heading in the right direction?" />}
    </Section>
  );
}

// ── Insights Tab ──────────────────────────────────────────────────────────────
function InsightsTab({ entries }) {
  const [insight, setInsight] = useState("");
  const [loading, setLoading] = useState(false);
  const [analysed, setAnalysed] = useState(false);
  const [error, setError] = useState("");

  const days = Object.entries(entries).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,14);
  const moodData = [...days].reverse().map(([d,e])=>({ d:formatDate(d), mood:e.mood||0, energy:e.energy||0 }));
  const calData  = [...days].reverse().map(([d,e])=>({ d:formatDate(d), cals:(e.food||[]).reduce((s,f)=>s+(f.calories||0),0) }));
  const weightData = [...days].filter(([,e])=>e.weight).reverse().map(([d,e])=>({ d:formatDate(d), w:parseFloat(e.weight) }));
  const stepsData  = [...days].filter(([,e])=>e.fitbit?.steps).reverse().map(([d,e])=>({ d:formatDate(d), s:e.fitbit.steps }));
  const maxCals = Math.max(...calData.map(d=>d.cals),1);
  const maxSteps = Math.max(...stepsData.map(d=>d.s),1);
  const minW = Math.min(...weightData.map(d=>d.w));
  const maxW = Math.max(...weightData.map(d=>d.w));

  const getInsights = async () => {
    setLoading(true); setError("");
    const summary = days.map(([d,e])=>({
      date:d,
      calories:(e.food||[]).reduce((s,f)=>s+(f.calories||0),0),
      meals:(e.food||[]).map(f=>f.meal+": "+f.text).join("; "),
      mood:MOODS.find(m=>m.value===e.mood)?.label,
      energy:ENERGY.find(m=>m.value===e.energy)?.label,
      moodNote:e.moodNote, exercise:e.exercise, weight:e.weight,
      steps:e.fitbit?.steps, sleepMins:e.fitbit?.sleepMins,
      deepMins:e.fitbit?.deepMins, remMins:e.fitbit?.remMins,
      restingHR:e.fitbit?.restingHR, activeMin:e.fitbit?.activeMin
    }));
    try {
      const resp = await askClaude(
        [{ role:"user", content:JSON.stringify(summary) }],
        `You are a health coach analysing a user's food diary, mood, energy, exercise, weight, and Fitbit data (steps, sleep stages, heart rate).
Look for genuine correlations: e.g. poor sleep vs low energy/mood the next day, high step days vs mood, calorie intake vs weight trend, deep sleep vs energy levels.
Write 4-6 specific, evidence-based bullet points from the actual data. Warm but honest. Use • for bullets. British English.`
      );
      setInsight(resp); setAnalysed(true);
    } catch(e) { setError(e.message); }
    setLoading(false);
  };

  if (days.length < 2) return <div style={{ textAlign:"center", padding:40, color:"#a07850", fontSize:15 }}>Log at least 2 days to unlock insights ✦</div>;

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:20 }}>
      <Section title="📈 Mood & Energy" accent="#7a9ec8">
        <div style={{ overflowX:"auto" }}>
          <svg width={Math.max(moodData.length*50,300)} height={120}>
            {[1,2,3,4,5].map(v=><line key={v} x1={0} x2={moodData.length*50} y1={110-(v-1)*20} y2={110-(v-1)*20} stroke="#ecdfc8" strokeWidth={1}/>)}
            <polyline points={moodData.map((d,i)=>`${i*50+25},${110-(d.mood-1)*20}`).join(" ")} fill="none" stroke="#c8955a" strokeWidth={2.5} strokeLinejoin="round"/>
            <polyline points={moodData.map((d,i)=>`${i*50+25},${110-(d.energy-1)*20}`).join(" ")} fill="none" stroke="#7a9ec8" strokeWidth={2.5} strokeLinejoin="round" strokeDasharray="4 2"/>
            {moodData.map((d,i)=><g key={i}><circle cx={i*50+25} cy={110-(d.mood-1)*20} r={4} fill="#c8955a"/><circle cx={i*50+25} cy={110-(d.energy-1)*20} r={4} fill="#7a9ec8"/><text x={i*50+25} y={118} textAnchor="middle" fontSize={9} fill="#a07850">{d.d.split(",")[0]}</text></g>)}
          </svg>
        </div>
        <div style={{ display:"flex", gap:14, marginTop:6, fontSize:12 }}><span style={{color:"#c8955a"}}>— Mood</span><span style={{color:"#7a9ec8"}}>-- Energy</span></div>
      </Section>

      {calData.some(d=>d.cals>0) && (
        <Section title="🔥 Daily Calories" accent="#c8955a">
          <div style={{ overflowX:"auto" }}>
            <svg width={Math.max(calData.length*50,300)} height={120}>
              {calData.map((d,i)=>{ const h=(d.cals/maxCals)*80; return <g key={i}><rect x={i*50+12} y={90-h} width={26} height={h} rx={4} fill={d.cals>2500?"#c87a6a":"#c8955a"} opacity={0.85}/><text x={i*50+25} y={108} textAnchor="middle" fontSize={9} fill="#a07850">{d.d.split(",")[0]}</text><text x={i*50+25} y={Math.max(88-h,14)} textAnchor="middle" fontSize={9} fill="#5a3e28">{d.cals||""}</text></g>; })}
            </svg>
          </div>
        </Section>
      )}

      {stepsData.length >= 2 && (
        <Section title="👟 Daily Steps" accent="#6a7ec8">
          <div style={{ overflowX:"auto" }}>
            <svg width={Math.max(stepsData.length*50,300)} height={120}>
              <line x1={0} x2={stepsData.length*50} y1={90-(10000/maxSteps)*80} y2={90-(10000/maxSteps)*80} stroke="#6a7ec855" strokeWidth={1} strokeDasharray="3 2"/>
              {stepsData.map((d,i)=>{ const h=(d.s/maxSteps)*80; return <g key={i}><rect x={i*50+12} y={90-h} width={26} height={h} rx={4} fill={d.s>=10000?"#6a9e6a":"#6a7ec8"} opacity={0.85}/><text x={i*50+25} y={108} textAnchor="middle" fontSize={9} fill="#a07850">{d.d.split(",")[0]}</text><text x={i*50+25} y={Math.max(88-h,14)} textAnchor="middle" fontSize={8} fill="#3d2b1a">{d.s>=1000?`${Math.round(d.s/100)/10}k`:d.s}</text></g>; })}
            </svg>
          </div>
          <div style={{ fontSize:11, color:"#a07850", marginTop:4 }}>Dashed line = 10,000 step goal · Green = goal reached</div>
        </Section>
      )}

      {weightData.length >= 2 && (
        <Section title="⚖️ Weight Trend" accent="#a07850">
          <div style={{ overflowX:"auto" }}>
            <svg width={Math.max(weightData.length*50,300)} height={120}>
              <polyline points={weightData.map((d,i)=>{const y=maxW===minW?60:100-((d.w-minW)/(maxW-minW))*80;return `${i*50+25},${y}`;}).join(" ")} fill="none" stroke="#a07850" strokeWidth={2.5} strokeLinejoin="round"/>
              {weightData.map((d,i)=>{const y=maxW===minW?60:100-((d.w-minW)/(maxW-minW))*80;return <g key={i}><circle cx={i*50+25} cy={y} r={4} fill="#a07850"/><text x={i*50+25} y={y-8} textAnchor="middle" fontSize={9} fill="#5a3e28">{d.w}</text><text x={i*50+25} y={118} textAnchor="middle" fontSize={9} fill="#a07850">{d.d.split(",")[0]}</text></g>;})}
            </svg>
          </div>
        </Section>
      )}

      <Section title="✦ AI Pattern Analysis" accent="#a07850">
        <button onClick={getInsights} disabled={loading}
          style={{ padding:"10px 22px", background:"linear-gradient(135deg,#c8955a,#a07850)", color:"#fff", border:"none", borderRadius:12, fontSize:15, fontFamily:"inherit", fontWeight:700 }}>
          {loading ? "Analysing…" : "Analyse my patterns"}
        </button>
        {loading && <div style={{ marginTop:10 }}><Spinner /></div>}
        {error && <div style={{ fontSize:12, color:"#c87a6a", marginTop:6 }}>{error}</div>}
        {insight && <AIBubble text={insight} />}
        {analysed && <ChatWidget systemPrompt="You are a health coach who has analysed multi-day food, mood, energy, exercise, weight, and Fitbit data. Answer follow-up questions and give actionable advice. British English." contextSummary={`Pattern analysis: ${insight}`} placeholder="e.g. What should I focus on first? Why does my energy dip mid-week?" />}
      </Section>
    </div>
  );
}

// ── History Tab ───────────────────────────────────────────────────────────────
function HistoryTab({ entries, onSelectDay }) {
  const days = Object.entries(entries).sort((a,b)=>b[0].localeCompare(a[0]));
  if (!days.length) return <div style={{ textAlign:"center", padding:40, color:"#a07850" }}>No entries yet. Start logging today!</div>;
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
      {days.map(([d,e])=>{
        const cals = (e.food||[]).reduce((s,f)=>s+(f.calories||0),0);
        const moodObj = MOODS.find(m=>m.value===e.mood);
        const energyObj = ENERGY.find(m=>m.value===e.energy);
        return (
          <button key={d} onClick={()=>onSelectDay(d)}
            style={{ textAlign:"left", padding:"14px 16px", borderRadius:14, border:"1.5px solid #ecdfc8", background:"#faf6f0", fontFamily:"inherit", width:"100%" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
              <div>
                <div style={{ fontWeight:700, color:"#3d2b1a", fontSize:15 }}>{formatDate(d)}</div>
                <div style={{ fontSize:12, color:"#a07850", marginTop:3 }}>
                  {(e.food||[]).length} meals{cals?` · ${cals} kcal`:""}
                  {e.fitbit?.steps ? ` · 👟 ${e.fitbit.steps.toLocaleString()}` : ""}
                  {e.fitbit?.sleepMins ? ` · 🌙 ${fmtMins(e.fitbit.sleepMins)}` : ""}
                  {e.exercise ? " · 🏃 active" : ""}
                  {e.weight ? ` · ⚖️ ${e.weight}kg` : ""}
                </div>
              </div>
              <div style={{ display:"flex", gap:6, fontSize:22 }}>
                {moodObj && <span>{moodObj.emoji}</span>}
                {energyObj && <span>{energyObj.emoji}</span>}
              </div>
            </div>
          </button>
        );
      })}
    </div>
  );
}

// ── Settings ──────────────────────────────────────────────────────────────────
function SettingsScreen({ onClose }) {
  const [key, setKey] = useState(getApiKey());
  const [saved, setSaved] = useState(false);
  const connected = !!getFitbitToken();

  const disconnectFitbit = () => { clearFitbitToken(); window.location.reload(); };

  return (
    <div style={{ position:"fixed", inset:0, background:"#fdf8f2", zIndex:100, padding:24, overflowY:"auto" }}>
      <button onClick={onClose} style={{ background:"none", border:"none", color:"#a07850", fontSize:16, fontFamily:"inherit", marginBottom:20 }}>← Back</button>
      <div style={{ fontWeight:700, fontSize:18, marginBottom:20 }}>Settings</div>

      <div style={{ marginBottom:24 }}>
        <Label>Anthropic API Key</Label>
        <input type="password" value={key} onChange={e=>setKey(e.target.value)}
          style={{ width:"100%", padding:"12px 14px", borderRadius:12, border:"1.5px solid #e0ccb4", background:"#fff", fontFamily:"monospace", fontSize:14, color:"#3d2b1a", outline:"none", marginBottom:10 }} />
        <button onClick={()=>{ saveApiKey(key.trim()); setSaved(true); setTimeout(()=>setSaved(false),2000); }}
          style={{ padding:"10px 20px", background:"#c8955a", color:"#fff", border:"none", borderRadius:10, fontSize:14, fontFamily:"inherit", fontWeight:600 }}>
          {saved ? "Saved ✓" : "Save key"}
        </button>
        <div style={{ marginTop:10, fontSize:12, color:"#a07850", lineHeight:1.7 }}>Stored only in this browser. Get a key at <b>console.anthropic.com</b></div>
      </div>

      <div style={{ borderTop:"1px solid #ecdfc8", paddingTop:20 }}>
        <Label>Fitbit</Label>
        {connected ? (
          <div>
            <div style={{ fontSize:13, color:"#6a9e6a", marginBottom:10 }}>✓ Connected</div>
            <button onClick={disconnectFitbit}
              style={{ padding:"10px 20px", background:"#c87a6a", color:"#fff", border:"none", borderRadius:10, fontSize:14, fontFamily:"inherit", fontWeight:600 }}>
              Disconnect Fitbit
            </button>
          </div>
        ) : (
          <div style={{ fontSize:13, color:"#a07850" }}>Not connected. Use the Fitbit section on the Log tab to connect.</div>
        )}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [hasKey, setHasKey] = useState(!!getApiKey());
  const [tab, setTab] = useState("log");
  const [entries, setEntries] = useState(()=>loadEntries());
  const [currentDay, setCurrentDay] = useState(today());
  const [showSettings, setShowSettings] = useState(false);
  const fitbitConnected = !!getFitbitToken();

  // Handle Fitbit OAuth callback
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const verifier = ls.str(FB_VERIFIER_KEY);
    if (code && verifier) {
      ls.del(FB_VERIFIER_KEY);
      // Clean URL immediately
      window.history.replaceState({}, "", window.location.pathname);
      exchangeCode(code, verifier).then(tokenData => {
        saveFitbitToken({ ...tokenData, expires_at: Date.now() + tokenData.expires_in * 1000 });
        // Auto-fetch immediately after connecting
        fetchFitbitDay().then(fitbit => {
          const td = today();
          const updated = { ...loadEntries(), [td]: { ...(loadEntries()[td]||{}), fitbit } };
          saveEntries(updated);
          setEntries(updated);
          ls.setStr(FB_FETCH_KEY, td);
        }).catch(()=>{});
      }).catch(e => console.error("Token exchange failed:", e));
    }
  }, []);

  // Auto-sync Fitbit on open if connected and not yet fetched today
  useEffect(() => {
    if (!fitbitConnected) return;
    const lastFetch = ls.str(FB_FETCH_KEY);
    if (lastFetch === today()) return;
    fetchFitbitDay().then(fitbit => {
      const td = today();
      setEntries(prev => {
        const updated = { ...prev, [td]: { ...(prev[td]||{}), fitbit } };
        saveEntries(updated);
        return updated;
      });
      ls.setStr(FB_FETCH_KEY, td);
    }).catch(()=>{});
  }, []);

  const updateEntry = (data) => {
    const updated = { ...entries, [currentDay]: data };
    setEntries(updated);
    saveEntries(updated);
  };

  const selectDay = (d) => { setCurrentDay(d); setTab("log"); };

  if (!hasKey) return <ApiKeyScreen onSave={()=>setHasKey(true)} />;
  if (showSettings) return <SettingsScreen onClose={()=>setShowSettings(false)} />;

  const isToday = currentDay === today();

  return (
    <div style={{ minHeight:"100vh", background:"#fdf8f2" }}>
      <div style={{ background:"linear-gradient(135deg,#3d2b1a 0%,#6a4020 100%)", padding:"16px 16px 0", position:"sticky", top:0, zIndex:10 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:14 }}>
          <div>
            <div style={{ fontSize:20, fontWeight:700, color:"#f5e9d6", letterSpacing:0.5 }}>
              ✦ Nourish {fitbitConnected && <span style={{ fontSize:12, color:"#aaa0d8", fontWeight:400 }}>· Fitbit ✓</span>}
            </div>
            <div style={{ fontSize:12, color:"#c8a878", marginTop:2 }}>
              {isToday?"Today — ":""}{formatDate(currentDay)}
              {!isToday && <button onClick={()=>{ setCurrentDay(today()); setTab("log"); }}
                style={{ marginLeft:8, fontSize:11, padding:"2px 8px", borderRadius:8, background:"#c8955a", color:"#fff", border:"none", fontFamily:"inherit" }}>↩ today</button>}
            </div>
          </div>
          <button onClick={()=>setShowSettings(true)} style={{ background:"none", border:"none", color:"#c8a878", fontSize:20, padding:4 }}>⚙️</button>
        </div>
        <div style={{ display:"flex" }}>
          {[["log","📋 Log"],["history","📅 History"],["insights","✦ Insights"]].map(([t,label])=>(
            <button key={t} onClick={()=>setTab(t)}
              style={{ padding:"10px 14px", background:tab===t?"#fdf8f2":"transparent", color:tab===t?"#3d2b1a":"#c8a878", border:"none", fontFamily:"inherit", fontSize:13, fontWeight:tab===t?700:400, borderRadius:"10px 10px 0 0", flex:1 }}>{label}</button>
          ))}
        </div>
      </div>
      <div style={{ maxWidth:600, margin:"0 auto", padding:"20px 14px 60px" }}>
        {tab==="log" && <LogTab entry={entries[currentDay]||{}} allEntries={entries} currentDay={currentDay} onChange={updateEntry} fitbitConnected={fitbitConnected} />}
        {tab==="history" && <HistoryTab entries={entries} onSelectDay={selectDay} />}
        {tab==="insights" && <InsightsTab entries={entries} />}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
